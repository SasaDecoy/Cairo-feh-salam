<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1">
<title>Cairo · Layla · Masari — Interactive Data Story</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Noto+Sans+Arabic:wght@400;600;700&display=swap">

<!-- MapLibre GL JS -->
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<!-- Turf.js for along-line interpolation (animated route traversal) -->
<script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>

<!-- Three.js — bound into MapLibre's WebGL context via CustomLayerInterface -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<!-- React 18 + Babel for JSX in-browser -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

<style>
  :root {
    --bg:         #07090C;
    --bg-alt:     #0D1117;
    --panel:      #161B22;
    --panel-deep: #111820;
    --fg:         #E6EDF3;
    --fg-body:    #C9D1D9;
    --fg-muted:   #8B949E;
    --fg-dim:     #6E7681;
    --grid:       #21262D;
    --accent:     #58A6FF;
    --ok:         #2A9D8F;
    --gold:       #E9C46A;
    --warn:       #E86F51;
    --orange:     #F4A261;
    --purple:     #7B2D8E;
    --pink:       #FF6B6B;
    --teal2:      #4ECDC4;
  }

  * { box-sizing: border-box; }
  html, body, #root {
    margin: 0; padding: 0;
    width: 100%; height: 100vh;
    background: var(--bg);
    color: var(--fg-body);
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    overflow: hidden;
  }

  /* ── Map container ─────────────────────────────────────────── */
  .map-stage {
    position: absolute; inset: 0;
    background: var(--bg);
  }
  .maplibregl-ctrl-attrib {
    background: rgba(13,17,23,0.5) !important;
    color: var(--fg-dim) !important;
    font-family: 'Share Tech Mono', monospace !important;
    font-size: 9px !important;
  }
  .maplibregl-ctrl-attrib a { color: var(--fg-muted) !important; }

  /* ── Animations ────────────────────────────────────────────── */
  @keyframes shimmer {
    0%   { background-position: 0% center; }
    100% { background-position: 200% center; }
  }
  @keyframes pulse-ring {
    0%   { transform: scale(1);   opacity: 0.9; }
    80%  { transform: scale(2.4); opacity: 0;   }
    100% { transform: scale(2.4); opacity: 0;   }
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0);    }
  }
  @keyframes fade-in {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes pulse-border {
    0%, 100% { opacity: 0.6; }
    50%      { opacity: 1.0; }
  }
  @keyframes scan {
    0%   { transform: translateY(-100%); }
    100% { transform: translateY(100%);  }
  }
  @keyframes chart-rise {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0)    scale(1);    }
  }

  /* ── Frosted glass card ────────────────────────────────────── */
  .card {
    position: relative;
    background: linear-gradient(160deg,
                rgba(13,17,23,0.82) 0%,
                rgba(17,24,32,0.82) 50%,
                rgba(13,17,23,0.82) 100%);
    backdrop-filter: blur(22px) saturate(150%);
    -webkit-backdrop-filter: blur(22px) saturate(150%);
    border: 1px solid rgba(88,166,255,0.16);
    border-radius: 14px;
    box-shadow: 0 0 40px rgba(88,166,255,0.08),
                inset 0 0 30px rgba(88,166,255,0.02);
    overflow: hidden;
  }
  .card::before, .card::after, .card .bl, .card .br {
    content: ''; position: absolute; width: 32px; height: 32px;
    opacity: 0.72; pointer-events: none;
  }
  .card::before {
    top: 0; left: 0;
    border-top: 2px solid var(--accent); border-left: 2px solid var(--accent);
    border-radius: 14px 0 0 0;
  }
  .card::after {
    top: 0; right: 0;
    border-top: 2px solid var(--ok); border-right: 2px solid var(--ok);
    border-radius: 0 14px 0 0;
  }
  .card .bl {
    bottom: 0; left: 0;
    border-bottom: 2px solid var(--ok); border-left: 2px solid var(--ok);
    border-radius: 0 0 0 14px;
  }
  .card .br {
    bottom: 0; right: 0;
    border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent);
    border-radius: 0 0 14px 0;
  }

  /* ── TOP BAR (brand + chapter + progress) ──────────────────── */
  .topbar {
    position: fixed; top: 14px; left: 14px; right: 14px;
    display: flex; align-items: center; gap: 16px;
    z-index: 30; pointer-events: none;
  }
  .brand {
    font-family: 'Orbitron', sans-serif; font-weight: 700;
    font-size: 12px; letter-spacing: 3px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--ok) 40%, var(--gold) 65%, var(--accent) 100%);
    background-size: 200% auto;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    animation: shimmer 6s linear infinite;
    filter: drop-shadow(0 0 16px rgba(88,166,255,0.45));
    text-transform: uppercase;
    padding: 10px 18px; border-radius: 100px;
    background-color: rgba(13,17,23,0.72);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(88,166,255,0.16);
    pointer-events: auto;
  }
  .chapter-pill {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px; letter-spacing: 3px; color: var(--fg-muted);
    padding: 10px 18px; border-radius: 100px;
    background: rgba(13,17,23,0.72);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.06);
    text-transform: uppercase;
    pointer-events: auto;
  }
  .progress-wrap {
    flex: 1; display: flex; align-items: center; gap: 14px;
    padding: 10px 20px; border-radius: 100px;
    background: rgba(13,17,23,0.72);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(88,166,255,0.08);
    pointer-events: auto;
  }
  .progress-track {
    flex: 1; height: 2px; background: rgba(88,166,255,0.12); border-radius: 1px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; transition: width 1400ms cubic-bezier(0.22,0.61,0.36,1);
    background: linear-gradient(90deg, var(--accent) 0%, var(--ok) 40%, var(--gold) 75%, var(--warn) 100%);
    box-shadow: 0 0 14px rgba(88,166,255,0.6);
  }
  .progress-counter {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em; color: var(--fg-muted);
    white-space: nowrap;
  }
  .mode-btns { display: flex; gap: 8px; pointer-events: auto; }
  .mode-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px; letter-spacing: 0.25em;
    padding: 8px 14px; border-radius: 100px;
    background: rgba(13,17,23,0.72);
    color: var(--fg-muted);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    cursor: pointer;
    transition: all 180ms;
    text-transform: uppercase;
  }
  .mode-btn:hover {
    color: var(--accent);
    border-color: rgba(88,166,255,0.35);
    background: rgba(88,166,255,0.08);
  }
  .mode-btn.active {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(88,166,255,0.14);
    box-shadow: 0 0 18px rgba(88,166,255,0.35);
  }

  /* ── NARRATIVE PANEL (floating, left side) ─────────────────── */
  .panel {
    position: fixed; left: 28px; top: 92px; bottom: 92px;
    width: 420px; max-width: 32vw;
    z-index: 20;
    padding: 32px 34px; overflow-y: auto; overflow-x: hidden;
  }
  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-thumb { background: rgba(88,166,255,0.25); border-radius: 2px; }

  .kicker {
    font-family: 'Orbitron', sans-serif;
    font-size: 9.5px; letter-spacing: 0.5em; color: var(--accent);
    opacity: 0.9; text-transform: uppercase;
    margin-bottom: 14px;
    animation: fade-up 600ms 200ms cubic-bezier(0.22,0.61,0.36,1) both;
  }
  .arabic {
    font-family: 'Noto Sans Arabic', sans-serif;
    font-size: 15px; color: var(--ok); font-weight: 600;
    direction: rtl; letter-spacing: 0.02em;
    margin-bottom: 10px;
    text-shadow: 0 0 14px rgba(42,157,143,0.3);
    animation: fade-up 600ms 320ms cubic-bezier(0.22,0.61,0.36,1) both;
  }
  .headline {
    font-family: 'Orbitron', sans-serif; font-weight: 700;
    font-size: 2.05rem; line-height: 1.08;
    margin: 4px 0 20px 0; letter-spacing: 0.3px;
    background: linear-gradient(120deg, var(--gold) 0%, var(--accent) 50%, var(--ok) 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    filter: drop-shadow(0 0 22px rgba(88,166,255,0.28));
    animation: fade-up 700ms 440ms cubic-bezier(0.22,0.61,0.36,1) both;
  }
  .body {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13.5px; line-height: 1.78; color: rgba(201,209,217,0.9);
    animation: fade-up 700ms 600ms cubic-bezier(0.22,0.61,0.36,1) both;
  }
  .metric {
    margin-top: 28px; padding-top: 22px;
    border-top: 1px solid rgba(88,166,255,0.16);
    animation: fade-up 700ms 760ms cubic-bezier(0.22,0.61,0.36,1) both;
  }
  .metric-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px; letter-spacing: 0.4em; color: var(--fg-muted);
    margin-bottom: 8px; text-transform: uppercase;
  }
  .metric-val {
    font-family: 'Orbitron', sans-serif; font-weight: 700;
    font-size: 2.6rem; color: var(--gold); line-height: 1;
    filter: drop-shadow(0 0 18px rgba(233,196,106,0.5));
  }
  .metric-unit {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 0.3em;
    color: rgba(233,196,106,0.88); margin-top: 6px;
  }

  .trip-plan {
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px solid rgba(88,166,255,0.12);
    animation: fade-up 700ms 860ms cubic-bezier(0.22,0.61,0.36,1) both;
  }
  .trip-plan-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px; letter-spacing: 0.34em; color: var(--fg-muted);
    margin-bottom: 12px; text-transform: uppercase;
  }
  .trip-leg {
    display: grid;
    grid-template-columns: 74px 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 10px 0;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .trip-leg:first-of-type { border-top: 0; }
  .trip-leg-mode {
    font-family: 'Orbitron', sans-serif;
    font-size: 8px; letter-spacing: 0.24em; color: var(--fg-muted);
  }
  .trip-leg-route {
    font-size: 11px; color: var(--fg-body); line-height: 1.45;
  }
  .trip-leg-time {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem; color: var(--accent);
    white-space: nowrap;
  }
  .trip-leg-note {
    margin-top: 3px;
    font-size: 9px;
    color: var(--fg-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .panel .hr {
    height: 1px; margin: 24px 0; opacity: 0.55;
    background: linear-gradient(90deg, transparent, var(--accent) 30%, var(--ok) 70%, transparent);
    box-shadow: 0 0 10px rgba(88,166,255,0.3);
    border: none;
  }

  /* ── BOTTOM BAR (controls) ─────────────────────────────────── */
  .bottombar {
    position: fixed; left: 28px; right: 28px; bottom: 18px;
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px; z-index: 25; pointer-events: none;
  }
  .hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 0.25em; color: var(--fg-dim);
    padding: 10px 18px; border-radius: 100px;
    background: rgba(13,17,23,0.72);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.06);
    pointer-events: auto;
    text-transform: uppercase;
  }
  .controls { display: flex; gap: 10px; pointer-events: auto; }
  .ctrl {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px; letter-spacing: 0.3em;
    padding: 10px 20px; border-radius: 100px;
    background: rgba(13,17,23,0.72);
    color: var(--accent);
    border: 1px solid rgba(88,166,255,0.28);
    backdrop-filter: blur(14px);
    cursor: pointer;
    transition: all 180ms;
    text-transform: uppercase;
  }
  .ctrl:hover {
    background: rgba(88,166,255,0.16);
    border-color: rgba(88,166,255,0.5);
    box-shadow: 0 0 20px rgba(88,166,255,0.4);
  }
  .ctrl:disabled { opacity: 0.35; cursor: not-allowed; }
  .ctrl.primary {
    background: linear-gradient(135deg, rgba(88,166,255,0.25), rgba(42,157,143,0.2));
    border-color: var(--accent);
    box-shadow: 0 0 18px rgba(88,166,255,0.35);
  }
  .ctrl.primary:hover {
    box-shadow: 0 0 28px rgba(88,166,255,0.55);
    background: linear-gradient(135deg, rgba(88,166,255,0.4), rgba(42,157,143,0.3));
  }

  /* ── CHAPTER MARKERS (bottom progress dots) ────────────────── */
  .chapters-strip {
    display: flex; gap: 6px; align-items: center;
  }
  .chap-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(88,166,255,0.15);
    border: 1px solid rgba(88,166,255,0.3);
    transition: all 300ms;
    cursor: pointer;
  }
  .chap-dot.active {
    background: var(--accent);
    box-shadow: 0 0 12px rgba(88,166,255,0.7);
    transform: scale(1.35);
  }
  .chap-dot.past { background: rgba(88,166,255,0.45); }
  .chap-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px; letter-spacing: 0.35em;
    color: var(--fg-muted); margin-right: 8px;
    text-transform: uppercase;
  }

  /* ── METRIC CHART CARD (H1 / H2 / H3 / Q18b inset) ─────────── */
  .chart-card {
    position: fixed; right: 28px; bottom: 86px;
    width: 420px; max-width: 34vw;
    padding: 20px 22px;
    z-index: 18;
    animation: chart-rise 700ms cubic-bezier(0.22,0.61,0.36,1) both;
  }
  .chart-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px; letter-spacing: 0.3em; color: var(--accent);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  /* ── BAR CHARTS (inline SVG) ───────────────────────────────── */
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--fg-muted);
    width: 120px; text-align: right; letter-spacing: 0.1em;
  }
  .bar-track {
    flex: 1; height: 16px; background: rgba(88,166,255,0.05);
    border-radius: 2px; overflow: hidden; position: relative;
  }
  .bar-fill {
    height: 100%;
    transition: width 1400ms cubic-bezier(0.22,0.61,0.36,1);
  }
  .bar-val {
    font-family: 'Orbitron', sans-serif; font-weight: 700;
    font-size: 11px; color: var(--gold);
    width: 70px; letter-spacing: 0.05em;
  }

  /* ── Q18b MATRIX ──────────────────────────────────────────── */
  .matrix {
    display: grid; grid-template-columns: 110px repeat(4, 1fr);
    gap: 3px; font-family: 'Share Tech Mono', monospace;
  }
  .matrix-cell {
    padding: 10px 6px; text-align: center;
    font-family: 'Orbitron', sans-serif; font-weight: 700;
    font-size: 11px; border-radius: 3px;
    animation: fade-in 700ms cubic-bezier(0.22,0.61,0.36,1) both;
  }
  .matrix-head {
    color: var(--accent); font-size: 9px;
    letter-spacing: 0.18em; padding: 8px 4px;
    text-align: center; text-transform: uppercase;
  }
  .matrix-rowlbl {
    color: var(--fg-muted); font-size: 10px;
    letter-spacing: 0.12em; padding: 10px 8px;
    text-align: right; text-transform: uppercase;
  }

  /* ── CTA BUTTONS (final scene) ─────────────────────────────── */
  .cta-row {
    display: flex; gap: 10px; margin-top: 26px;
    flex-wrap: wrap;
    animation: fade-up 800ms 1000ms cubic-bezier(0.22,0.61,0.36,1) both;
  }
  .cta {
    flex: 1; min-width: 150px;
    padding: 14px 18px; border-radius: 10px;
    font-family: 'Orbitron', sans-serif; font-weight: 700;
    font-size: 10px; letter-spacing: 0.28em;
    background: linear-gradient(135deg, rgba(88,166,255,0.22), rgba(42,157,143,0.15));
    color: var(--accent);
    border: 1px solid rgba(88,166,255,0.35);
    cursor: pointer;
    transition: all 220ms;
    text-transform: uppercase;
    text-align: center;
  }
  .cta:hover {
    background: linear-gradient(135deg, rgba(88,166,255,0.4), rgba(42,157,143,0.25));
    border-color: var(--accent);
    box-shadow: 0 0 28px rgba(88,166,255,0.5);
    transform: translateY(-2px);
  }

  /* ── VIGNETTE OVERLAY ───────────────────────────────────────── */
  .vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center,
                transparent 55%,
                rgba(7,9,12,0.22) 85%,
                rgba(7,9,12,0.5) 100%);
    pointer-events: none; z-index: 5;
  }

  /* ── loading screen ────────────────────────────────────────── */
  .splash {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg); z-index: 50;
    transition: opacity 500ms;
  }
  .splash.hidden { opacity: 0; pointer-events: none; }
  .splash-logo {
    font-family: 'Orbitron', sans-serif; font-weight: 900;
    font-size: 2rem; letter-spacing: 0.3em;
    background: linear-gradient(90deg, var(--accent), var(--ok), var(--gold), var(--accent));
    background-size: 200% auto;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    animation: shimmer 3s linear infinite;
    filter: drop-shadow(0 0 32px rgba(88,166,255,0.5));
  }
  .splash-sub {
    font-family: 'Share Tech Mono', monospace;
    color: var(--fg-muted); letter-spacing: 0.4em;
    font-size: 10px; margin-top: 18px; text-transform: uppercase;
  }
  .splash-bar {
    width: 220px; height: 1px; margin-top: 26px;
    background: rgba(88,166,255,0.15); overflow: hidden;
  }
  .splash-bar::after {
    content: ''; display: block; width: 30%; height: 100%;
    background: var(--accent);
    animation: scan 1.4s linear infinite;
    box-shadow: 0 0 14px var(--accent);
  }
  .version-tag {
    position: fixed; top: 14px; right: 14px;
    z-index: 40; pointer-events: none;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; letter-spacing: 0.25em; color: var(--fg-dim);
    padding: 4px 10px; border-radius: 100px;
    background: rgba(13,17,23,0.6);
    border: 1px solid rgba(88,166,255,0.12);
    text-transform: uppercase;
  }
  .streamlit-return {
    position: fixed;
    top: 14px;
    right: 238px;
    z-index: 80;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    height: 34px;
    padding: 0 16px;
    border-radius: 999px;
    border: 1px solid rgba(233,196,106,0.36);
    background:
      linear-gradient(135deg, rgba(13,17,23,0.82), rgba(17,24,32,0.78)),
      radial-gradient(circle at 20% 50%, rgba(233,196,106,0.18), transparent 55%);
    color: #E9C46A;
    box-shadow: 0 0 26px rgba(233,196,106,0.12), inset 0 0 18px rgba(88,166,255,0.04);
    backdrop-filter: blur(14px) saturate(150%);
    -webkit-backdrop-filter: blur(14px) saturate(150%);
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 180ms ease, border-color 180ms ease, color 180ms ease, box-shadow 180ms ease;
  }
  .streamlit-return:hover {
    transform: translateY(-1px);
    color: #071018;
    border-color: rgba(233,196,106,0.8);
    background: linear-gradient(90deg, #E9C46A, #58A6FF, #2A9D8F);
    box-shadow: 0 0 34px rgba(88,166,255,0.34);
  }
  .streamlit-return:focus-visible {
    outline: 2px solid #58A6FF;
    outline-offset: 3px;
  }
  .streamlit-return-arrow {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 0;
  }
  /* ─── Density 3D heatmap iframe (Scene 7 / "TWO DENSITIES") ─────────────

    if (explicitReturn) {

        const isStoryStatic = ref.pathname.includes('/app/static/story_assets/');
        if (ref.origin === window.location.origin && !isStoryStatic) return ref.href;

    }

    return `${window.location.origin}/`;

// Per-layer opacity property name (differs by layer type)
function opacityProp(layerId, map) {
  const l = map.getLayer(layerId);
  if (!l) return null;
  if (l.type === 'circle')  return 'circle-opacity';
  if (l.type === 'line')    return 'line-opacity';
  if (l.type === 'fill')    return 'fill-opacity';
  if (l.type === 'symbol')  return 'icon-opacity';
  if (l.type === 'raster')  return 'raster-opacity';
  return null;
}
function opacityPropStroke(layerId, map) {
  const l = map.getLayer(layerId);
  if (!l) return null;
  if (l.type === 'circle') return 'circle-stroke-opacity';
  return null;
}

// ═══════════════════════════════════════════════════════════════════════
//  THREE.JS 3D LAYER · senior-level CustomLayerInterface integration
//  ---------------------------------------------------------------------
//  Binds a Three.js scene to MapLibre's own WebGL context so 3D geometry
//  lives *inside* the map (depth-sorted, pitch-aware, bearing-aware).
//  No second canvas, no DOM overlay. Objects sit in a "meters-from-origin"
//  local frame; we compose that frame with MapLibre's mainMatrix every
//  render call to project it through the map camera.
// ═══════════════════════════════════════════════════════════════════════
const THREE_ORIGIN_LNGLAT = [31.24, 30.05]; // downtown-ish; close to all scenes
let ORIGIN_MERC = null;
let METER_TO_MERC = 1;

function initThreeMercator() {
  ORIGIN_MERC = maplibregl.MercatorCoordinate.fromLngLat(THREE_ORIGIN_LNGLAT, 0);
  METER_TO_MERC = ORIGIN_MERC.meterInMercatorCoordinateUnits();
}

function lngLatToWorld([lng, lat], altitudeMeters = 0) {
  const m = maplibregl.MercatorCoordinate.fromLngLat([lng, lat], 0);
  return new THREE.Vector3(
    (m.x - ORIGIN_MERC.x) / METER_TO_MERC,
    altitudeMeters,
    (m.y - ORIGIN_MERC.y) / METER_TO_MERC,
  );
}

// Procedural PBR environment map — three-stop gradient sky rendered into a
// cube target and passed through PMREMGenerator for roughness-prefiltered
// reflections. Every MeshPhysicalMaterial (orbs, vehicle chassis) picks
// this up as `scene.environment`, so glossy surfaces reflect a warm Cairo
// sky without any external HDR file.
function buildProceduralEnvMap(renderer) {
  const pmrem = new THREE.PMREMGenerator(renderer);
  const tmpScene = new THREE.Scene();
  const skyGeo = new THREE.SphereGeometry(300, 32, 24);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      uTop: { value: new THREE.Color(0x243A5C) }, // deep indigo top
      uMid: { value: new THREE.Color(0x6A4A62) }, // warm horizon
      uBot: { value: new THREE.Color(0x1A1F28) }, // dark ground wash
      uAccent: { value: new THREE.Color(0xE9C46A) }, // gold rim for sun direction
    },
    vertexShader: `
      varying vec3 vDir;
      void main() {
        vDir = normalize(position);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      varying vec3 vDir;
      uniform vec3 uTop, uMid, uBot, uAccent;
      void main() {
        float h = clamp(vDir.y * 0.5 + 0.5, 0.0, 1.0);
        vec3 sky = mix(uBot, uMid, smoothstep(0.35, 0.6, h));
        sky = mix(sky, uTop, smoothstep(0.6, 0.9, h));
        // Gold sun-rim in the −x/+y hemisphere (matches our DirectionalLight)
        float sunDot = max(0.0, dot(vDir, normalize(vec3(-0.45, 0.65, -0.6))));
        sky += uAccent * pow(sunDot, 24.0) * 0.7;
        gl_FragColor = vec4(sky, 1.0);
      }
    `,
  });
  tmpScene.add(new THREE.Mesh(skyGeo, skyMat));
  const envTexture = pmrem.fromScene(tmpScene, 0.04).texture;
  pmrem.dispose();
  skyGeo.dispose();
  skyMat.dispose();
  return envTexture;
}

// Inject a rim-fresnel emissive boost into any MeshStandardMaterial /
// MeshPhysicalMaterial. Edge-on pixels get a stronger emissive pop, giving
// the orb + Layla avatar a rim-lit "holographic" look without a second pass.
function applyFresnelRim(material, { power = 2.4, strength = 1.8 } = {}) {
  material.onBeforeCompile = (shader) => {
    shader.vertexShader = shader.vertexShader
      .replace('#include <common>',
        `#include <common>
         varying vec3 vFresnelViewDir;
         varying vec3 vFresnelNormal;`)
      .replace('#include <worldpos_vertex>',
        `#include <worldpos_vertex>
         vFresnelNormal  = normalize(mat3(modelMatrix) * normal);
         vFresnelViewDir = normalize(cameraPosition - worldPosition.xyz);`);
    shader.fragmentShader = shader.fragmentShader
      .replace('#include <common>',
        `#include <common>
         varying vec3 vFresnelViewDir;
         varying vec3 vFresnelNormal;`)
      .replace('#include <emissivemap_fragment>',
        `#include <emissivemap_fragment>
         float fres = pow(1.0 - clamp(dot(vFresnelNormal, vFresnelViewDir), 0.0, 1.0), ${power.toFixed(2)});
         totalEmissiveRadiance += emissive * fres * ${strength.toFixed(2)};`);
  };
  material.needsUpdate = true;
}

function makeGlyphTexture(letter, glyphColor, ringColor) {
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const ctx = c.getContext('2d');
  const grd = ctx.createRadialGradient(128, 128, 20, 128, 128, 130);
  grd.addColorStop(0, '#0D1117');
  grd.addColorStop(1, '#161B22');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(128, 128, 124, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = ringColor;
  ctx.lineWidth = 10; ctx.stroke();
  ctx.shadowColor = glyphColor; ctx.shadowBlur = 36;
  ctx.fillStyle = glyphColor;
  ctx.font = 'bold 150px "Orbitron", "Arial Black", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(letter, 128, 142);
  const tex = new THREE.CanvasTexture(c);
  tex.anisotropy = 4; tex.needsUpdate = true;
  return tex;
}

// Floating station name — a sprite-billboard with a rounded pill drawn to a
// canvas. Attached as a child of each pin so it inherits spawn/LOD scaling.
// Opacity is modulated per-frame by zoom so labels fade out at wide shots.
function makeStationLabel(name, color = '#E6EDF3') {
  const c = document.createElement('canvas');
  c.width = 768; c.height = 160;
  const ctx = c.getContext('2d');
  // Rounded rect background
  const r = 40, pad = 8;
  ctx.fillStyle = 'rgba(13, 17, 23, 0.78)';
  ctx.beginPath();
  ctx.moveTo(pad + r, pad);
  ctx.arcTo(c.width - pad, pad,             c.width - pad, c.height - pad, r);
  ctx.arcTo(c.width - pad, c.height - pad,  pad,           c.height - pad, r);
  ctx.arcTo(pad,           c.height - pad,  pad,           pad,            r);
  ctx.arcTo(pad,           pad,             c.width - pad, pad,            r);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.stroke();
  // Text
  ctx.shadowColor = color;
  ctx.shadowBlur = 18;
  ctx.fillStyle = color;
  ctx.font = 'bold 76px Orbitron, "Arial Black", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(name.toUpperCase(), c.width / 2, c.height / 2 + 4);

  const tex = new THREE.CanvasTexture(c);
  tex.anisotropy = 4;
  tex.minFilter = THREE.LinearFilter;
  tex.needsUpdate = true;

  const mat = new THREE.SpriteMaterial({
    map: tex, transparent: true, opacity: 0, depthWrite: false, depthTest: false,
  });
  const sprite = new THREE.Sprite(mat);
  // World units: ~480 m wide, ~100 m tall — legible at zoom 11–16
  sprite.scale.set(480, 100, 1);
  sprite.position.y = 460; // floats above the orb, in the pin's local frame
  sprite.center.set(0.5, 0);
  sprite.userData = { isStationLabel: true };
  return sprite;
}

function makeStationPin({ color, ringColor, letter, letterHex, scale = 1 }) {
  const group = new THREE.Group();
  // XL dimensions — pins read as major landmarks, not dots on the map.
  // Zoom-adaptive LOD in render() further modulates size per frame.
  const shaftH = 320 * scale;

  // Base plinth — metallic disc anchoring the pin
  const plinthGeo = new THREE.CylinderGeometry(52 * scale, 64 * scale, 12 * scale, 40);
  const plinthMat = new THREE.MeshPhysicalMaterial({
    color, emissive: color, emissiveIntensity: 0.28,
    metalness: 0.85, roughness: 0.25,
    clearcoat: 0.6, clearcoatRoughness: 0.3,
  });
  const plinth = new THREE.Mesh(plinthGeo, plinthMat);
  plinth.position.y = 6 * scale;

  // Tapered shaft
  const shaftGeo = new THREE.CylinderGeometry(10 * scale, 40 * scale, shaftH, 32);
  shaftGeo.translate(0, shaftH / 2 + 12 * scale, 0);
  const shaftMat = new THREE.MeshPhysicalMaterial({
    color, emissive: color, emissiveIntensity: 0.35,
    metalness: 0.68, roughness: 0.28,
    clearcoat: 0.55, clearcoatRoughness: 0.25,
  });
  const shaft = new THREE.Mesh(shaftGeo, shaftMat);

  // Collar — bright emissive ring just below the orb
  const collarGeo = new THREE.TorusGeometry(20 * scale, 4 * scale, 12, 48);
  const collarMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.98 });
  const collar = new THREE.Mesh(collarGeo, collarMat);
  collar.position.y = shaftH + 10 * scale;
  collar.rotation.x = Math.PI / 2;

  // Glyph orb — oversized so the M/L/B letter reads from any zoom
  const orbTex = makeGlyphTexture(letter, letterHex, ringColor);
  const orbGeo = new THREE.SphereGeometry(76 * scale, 40, 32);
  const orbMat = new THREE.MeshPhysicalMaterial({
    map: orbTex,
    emissive: color, emissiveIntensity: 1.3,
    metalness: 0.08, roughness: 0.22,
    clearcoat: 0.9, clearcoatRoughness: 0.12,
  });
  applyFresnelRim(orbMat, { power: 2.0, strength: 3.0 });
  const orb = new THREE.Mesh(orbGeo, orbMat);
  orb.position.y = shaftH + 54 * scale;

  // Volumetric halo — big additive glow, distinctly visible
  const haloGeo = new THREE.SphereGeometry(144 * scale, 28, 20);
  const haloMat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 0.28, depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const halo = new THREE.Mesh(haloGeo, haloMat);
  halo.position.y = shaftH + 54 * scale;

  // Orbit ring — thick, bright, unmistakable
  const orbitGeo = new THREE.TorusGeometry(96 * scale, 3.6 * scale, 12, 96);
  const orbitMat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 0.98,
  });
  const orbit = new THREE.Mesh(orbitGeo, orbitMat);
  orbit.position.y = shaftH + 54 * scale;
  orbit.rotation.x = Math.PI / 2.4;

  // Sky beam — long and bright, catches attention from across the city
  const beamGeo = new THREE.CylinderGeometry(4.5 * scale, 9 * scale, 380 * scale, 22, 1, true);
  beamGeo.translate(0, 190 * scale, 0);
  const beamMat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 0.22, depthWrite: false,
    side: THREE.DoubleSide, blending: THREE.AdditiveBlending,
  });
  const beam = new THREE.Mesh(beamGeo, beamMat);
  beam.position.y = shaftH + 114 * scale;

  // Ground ring — bigger footprint
  const groundRingGeo = new THREE.RingGeometry(72 * scale, 144 * scale, 64);
  const groundRingMat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 0.55,
    side: THREE.DoubleSide, depthWrite: false,
  });
  const groundRing = new THREE.Mesh(groundRingGeo, groundRingMat);
  groundRing.rotation.x = -Math.PI / 2;
  groundRing.position.y = 1;

  group.add(plinth, shaft, collar, orb, halo, orbit, beam, groundRing);
  group.userData = {
    shaft, orb, halo, ring: groundRing, orbit, beam, color,
    baseScale: scale, // for zoom-adaptive LOD in render()
  };
  return group;
}

function makeLaylaAvatar() {
  const group = new THREE.Group();
  // Layla character colour — distinct from any transit mode. Microbus (the
  // mode she rides) is coral #E86F51; she is a warmer ORANGE so the avatar
  // never blends with the vehicle she's about to board.
  const PRIMARY = 0xF4A261; // warm orange — her colour
  const DRESS   = 0x8A3D27; // darker tunic
  const SKIN    = 0xFFD8BA;
  const HIJAB   = 0x4A1F14; // dark burgundy scarf

  // ── Legs (two capsules, subtly offset)
  const legGeo = new THREE.CapsuleGeometry(7, 52, 6, 12);
  const legMat = new THREE.MeshStandardMaterial({
    color: 0x1A2735, emissive: 0x1A2735, emissiveIntensity: 0.05,
    metalness: 0.1, roughness: 0.6,
  });
  const legL = new THREE.Mesh(legGeo, legMat);
  legL.position.set(-9, 30, 0);
  const legR = new THREE.Mesh(legGeo, legMat);
  legR.position.set(9, 30, 0);

  // ── Torso — long tapered cylinder (tunic shape)
  const torsoGeo = new THREE.CylinderGeometry(18, 28, 72, 20);
  torsoGeo.translate(0, 36, 0);
  const torsoMat = new THREE.MeshPhysicalMaterial({
    color: PRIMARY, emissive: PRIMARY, emissiveIntensity: 0.22,
    metalness: 0.18, roughness: 0.45,
    clearcoat: 0.4, clearcoatRoughness: 0.45,
  });
  applyFresnelRim(torsoMat, { power: 2.6, strength: 1.5 });
  const torso = new THREE.Mesh(torsoGeo, torsoMat);
  torso.position.y = 60;

  // Accent belt at the waist
  const beltGeo = new THREE.TorusGeometry(20, 3, 8, 32);
  const beltMat = new THREE.MeshBasicMaterial({ color: DRESS });
  const belt = new THREE.Mesh(beltGeo, beltMat);
  belt.rotation.x = Math.PI / 2;
  belt.position.y = 82;

  // ── Arms — two capsules with a slight outward angle (mounted on a pivot)
  const armMat = new THREE.MeshStandardMaterial({
    color: PRIMARY, emissive: PRIMARY, emissiveIntensity: 0.18,
    metalness: 0.15, roughness: 0.5,
  });
  applyFresnelRim(armMat, { power: 2.8, strength: 1.3 });
  const armGeo = new THREE.CapsuleGeometry(5.5, 52, 6, 12);
  const armPivotL = new THREE.Group();
  armPivotL.position.set(-22, 120, 0);
  const armL = new THREE.Mesh(armGeo, armMat);
  armL.position.y = -28;
  armPivotL.add(armL);
  armPivotL.rotation.z = 0.12;

  const armPivotR = new THREE.Group();
  armPivotR.position.set(22, 120, 0);
  const armR = new THREE.Mesh(armGeo, armMat);
  armR.position.y = -28;
  armPivotR.add(armR);
  armPivotR.rotation.z = -0.12;

  // ── Neck + head
  const neckGeo = new THREE.CylinderGeometry(7, 9, 12, 12);
  const neckMat = new THREE.MeshStandardMaterial({ color: SKIN, roughness: 0.5 });
  const neck = new THREE.Mesh(neckGeo, neckMat);
  neck.position.y = 130;

  const headGeo = new THREE.SphereGeometry(19, 28, 22);
  const headMat = new THREE.MeshPhysicalMaterial({
    color: SKIN, emissive: PRIMARY, emissiveIntensity: 0.15,
    metalness: 0.0, roughness: 0.48,
    clearcoat: 0.2, clearcoatRoughness: 0.5,
  });
  applyFresnelRim(headMat, { power: 2.4, strength: 1.4 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 150;

  // ── Hijab — elongated sphere covering crown + neck, with trailing flap
  const hijabGeo = new THREE.SphereGeometry(22, 28, 22, 0, Math.PI * 2, 0, Math.PI * 0.72);
  const hijabMat = new THREE.MeshPhysicalMaterial({
    color: HIJAB, emissive: PRIMARY, emissiveIntensity: 0.08,
    metalness: 0.18, roughness: 0.55,
    clearcoat: 0.35, clearcoatRoughness: 0.5,
    side: THREE.DoubleSide,
  });
  applyFresnelRim(hijabMat, { power: 2.6, strength: 1.2 });
  const hijab = new THREE.Mesh(hijabGeo, hijabMat);
  hijab.position.y = 152;

  // Trailing scarf flap behind the head
  const scarfGeo = new THREE.PlaneGeometry(18, 34, 1, 4);
  const scarfMat = new THREE.MeshStandardMaterial({
    color: HIJAB, emissive: HIJAB, emissiveIntensity: 0.1,
    side: THREE.DoubleSide, roughness: 0.55,
  });
  const scarf = new THREE.Mesh(scarfGeo, scarfMat);
  scarf.position.set(0, 136, -16);
  scarf.rotation.x = -0.35;

  // ── Halo ring on the ground
  const ringGeo = new THREE.RingGeometry(60, 130, 56);

  // Pivot so we can rotate the whole figure on Y without altering limbs
  const figure = new THREE.Group();
  figure.add(legL, legR, torso, belt, armPivotL, armPivotR, neck, head, hijab, scarf);

  group.add(glow, figure, ring);
  group.userData = { figure, torso, head, hijab, ring, glow, armPivotL, armPivotR, legL, legR, scarf };
  return group;
}

function makeVehicle(kind) {
  const group = new THREE.Group();
  const P = kind === 'metro'
    ? { body: 0x1F3A5F, accent: 0x58A6FF, window: 0xBFE0FF, roof: 0x2A4A75, glow: 0x8FC6FF, len: 140 }
    : { body: 0x8A3D27, accent: 0xE86F51, window: 0xFFE0D2, roof: 0xA54E36, glow: 0xFFAC8E, len: 84  };

  const H = 44, W = 46;
  const wheelR = 8, wheelAxleY = 10;

  // Build one vehicle "car" — chassis + roof + windows + 4 wheels
  const mkCar = (L, offsetX, isLead = true) => {
    const car = new THREE.Group();

    // Chassis — car-paint physical material (metallic + clearcoat)
    const chassisGeo = new THREE.BoxGeometry(L, H, W);
    const chassisMat = new THREE.MeshPhysicalMaterial({
      color: P.body, emissive: P.accent, emissiveIntensity: 0.15,
      metalness: 0.75, roughness: 0.26,
      clearcoat: 0.92, clearcoatRoughness: 0.12,
    });
    const chassis = new THREE.Mesh(chassisGeo, chassisMat);
    chassis.position.y = H / 2 + wheelAxleY + 4;

    // Roof — slightly inset, more emissive
    const roofGeo = new THREE.BoxGeometry(L * 0.92, 5, W * 0.94);
    const roofMat = new THREE.MeshPhysicalMaterial({
      color: P.roof, emissive: P.accent, emissiveIntensity: 0.4,
      metalness: 0.7, roughness: 0.3,
      clearcoat: 0.7, clearcoatRoughness: 0.22,
    });
    const roof = new THREE.Mesh(roofGeo, roofMat);
    roof.position.y = H + wheelAxleY + 8;

    // Window strip — emissive plane (both sides + front windscreen)
    const winGeo = new THREE.PlaneGeometry(L * 0.82, H * 0.42);
    const winMat = new THREE.MeshBasicMaterial({
      color: P.window, transparent: true, opacity: 0.95,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const winL = new THREE.Mesh(winGeo, winMat);
    winL.position.set(0, H / 2 + wheelAxleY + 8, W / 2 + 0.25);
    const winR = winL.clone();
    winR.rotation.y = Math.PI;
    winR.position.set(0, H / 2 + wheelAxleY + 8, -W / 2 - 0.25);

    // Front windscreen (only for lead car)
    let winF = null;
    if (isLead) {
      const winFGeo = new THREE.PlaneGeometry(W * 0.75, H * 0.42);
      winF = new THREE.Mesh(winFGeo, winMat);
      winF.rotation.y = Math.PI / 2;
      winF.position.set(L / 2 + 0.25, H / 2 + wheelAxleY + 8, 0);
    }

    // Wheels — four tori with rubber material
    const wheelGeo = new THREE.TorusGeometry(wheelR, 3.4, 12, 22);
    wheelGeo.rotateY(Math.PI / 2); // axles along Z
    const wheelMat = new THREE.MeshStandardMaterial({
      color: 0x0A0D12, metalness: 0.4, roughness: 0.75,
    });
    const hubMat = new THREE.MeshStandardMaterial({
      color: 0xC0C8D0, metalness: 0.85, roughness: 0.3,
    });
    const hubGeo = new THREE.CircleGeometry(wheelR * 0.55, 16);
    const makeWheel = (x, z) => {
      const w = new THREE.Group();
      const tyre = new THREE.Mesh(wheelGeo, wheelMat);
      const hub  = new THREE.Mesh(hubGeo, hubMat);
      hub.position.z = 3.6; hub.rotation.y = Math.PI / 2;
      const hub2 = hub.clone(); hub2.position.z = -3.6;
      w.add(tyre, hub, hub2);
      w.position.set(x, wheelAxleY, z);
      return w;
    };
    const wheels = [
      makeWheel(L / 2 - 14,  W / 2 - 3),
      makeWheel(L / 2 - 14, -W / 2 + 3),
      makeWheel(-L / 2 + 14,  W / 2 - 3),
      makeWheel(-L / 2 + 14, -W / 2 + 3),
    ];

    car.add(chassis, roof, winL, winR, ...wheels);
    if (winF) car.add(winF);
    car.position.x = offsetX;
    car.userData = { wheels };
    return car;
  };

  // Assemble — one microbus OR two linked metro cars
  const cars = [];
  if (kind === 'metro') {
    const gap = P.len * 0.04;
    const sectionLen = (P.len - gap) / 2;
    const c1 = mkCar(sectionLen, (sectionLen + gap) / 2, true);
    const c2 = mkCar(sectionLen, -(sectionLen + gap) / 2, false);
    // Accordion connector between the two cars
    const connGeo = new THREE.BoxGeometry(gap * 2.2, H * 0.7, W * 0.55);
    const connMat = new THREE.MeshStandardMaterial({
      color: 0x0A0D12, metalness: 0.65, roughness: 0.6,
    });
    const conn = new THREE.Mesh(connGeo, connMat);
    conn.position.set(0, H / 2 + wheelAxleY + 4, 0);
    group.add(c1, c2, conn);
    cars.push(c1, c2);

    // Pantograph antenna on top of metro
    const poleGeo = new THREE.CylinderGeometry(0.8, 0.8, 28, 8);
    const poleMat = new THREE.MeshStandardMaterial({
      color: 0x888C94, metalness: 0.9, roughness: 0.25,
    });
    const pole = new THREE.Mesh(poleGeo, poleMat);
    pole.position.y = H + wheelAxleY + 22;
    const capGeo = new THREE.BoxGeometry(20, 2, 8);
    const cap = new THREE.Mesh(capGeo, poleMat);
    cap.position.y = H + wheelAxleY + 36;
    group.add(pole, cap);
  } else {
    const c = mkCar(P.len, 0, true);
    group.add(c);
    cars.push(c);
  }

  // Headlights (front = +X direction of travel)
  const hlGeo = new THREE.SphereGeometry(5, 14, 12);
  const hlMat = new THREE.MeshBasicMaterial({ color: 0xFFFFFF });
  const hlL = new THREE.Mesh(hlGeo, hlMat);
  hlL.position.set(P.len / 2 + 2, H / 2 + wheelAxleY + 4, W / 4);
  const hlR = hlL.clone();
  hlR.position.set(P.len / 2 + 2, H / 2 + wheelAxleY + 4, -W / 4);

  // Headlight beams — translucent cones projecting forward
  const beamGeo = new THREE.ConeGeometry(14, 68, 20, 1, true);
  beamGeo.translate(0, 34, 0); // tip at origin so rotation puts tip at the bulb
  const beamMat = new THREE.MeshBasicMaterial({
    color: 0xFFF5D0, transparent: true, opacity: 0.22,
    side: THREE.DoubleSide, depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const beamL = new THREE.Mesh(beamGeo, beamMat);
  beamL.rotation.z = -Math.PI / 2;
  beamL.position.set(P.len / 2 + 4, H / 2 + wheelAxleY + 4, W / 4);
  const beamR = beamL.clone();
  beamR.position.set(P.len / 2 + 4, H / 2 + wheelAxleY + 4, -W / 4);

  // Rear lights
  const rearMat = new THREE.MeshBasicMaterial({ color: 0xFF4133 });
  const rearL = new THREE.Mesh(hlGeo, rearMat);
  rearL.position.set(-P.len / 2 - 2, H / 2 + wheelAxleY + 4, W / 4);
  const rearR = rearL.clone();
  rearR.position.set(-P.len / 2 - 2, H / 2 + wheelAxleY + 4, -W / 4);

  // Ground glow disc under the vehicle
  const groundGeo = new THREE.CircleGeometry(P.len * 0.85, 40);
  const groundMat = new THREE.MeshBasicMaterial({
    color: P.glow, transparent: true, opacity: 0.3, depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = 0.5;

  group.add(hlL, hlR, beamL, beamR, rearL, rearR, ground);
  group.userData = { kind, ground, cars, beams: [beamL, beamR] };
  return group;
}

// Phase-1 GHOST TERMINAL marker — a small 3D pin distinct from station pins.
// Compact downward-pointing cone (the "stake in the ground") + glowing orb
// floating just above + ground halo. Category drives color + opacity:
//   stranded (>2 km from new metro) → coral, translucent ghost
//   marginal (1–2 km)               → gold, more solid
//   reached  (<1 km)                → teal, fully present (a "win")
// Sizes are intentionally smaller than station pins so they read as a
// secondary swarm — but still legible at zoom 9–13 thanks to the LOD scaler.
function makeGhostMarker(category) {
  const isStranded = category === 'stranded';
  const isReached  = category === 'reached';
  const colorHex = isReached ? 0x2A9D8F : isStranded ? 0xE86F51 : 0xE9C46A;
  const baseAlpha = isReached ? 1.0 : isStranded ? 0.85 : 0.95;
  // Reached ghosts (the 9 "wins") render fully opaque + brightest emissive.
  // Stranded ghosts (the 97 majority) render as semi-transparent "ghosts"
  // with a softer alpha and slower pulse — visible everywhere, not blocking.

  const group = new THREE.Group();
  const SHAFT_H = 90;   // tall stake — was 38
  const ORB_R   = 22;   // big orb — was 11
  const HALO_R  = 50;   // big halo — was 22
  const ORB_Y   = SHAFT_H + ORB_R + 8;

  // Tapered shaft pointing downward (stake-in-the-ground silhouette)
  const stakeGeo = new THREE.CylinderGeometry(8, 22, SHAFT_H, 22);
  stakeGeo.translate(0, SHAFT_H / 2, 0);
  const stakeMat = new THREE.MeshPhysicalMaterial({
    color: colorHex,
    emissive: colorHex, emissiveIntensity: isReached ? 0.55 : 0.42,
    metalness: 0.55, roughness: 0.3,
    clearcoat: 0.65, clearcoatRoughness: 0.22,
    transparent: !isReached, opacity: baseAlpha,
  });
  applyFresnelRim(stakeMat, { power: 2.2, strength: 1.6 });
  const stake = new THREE.Mesh(stakeGeo, stakeMat);

  // Bright collar where the orb meets the stake
  const collarGeo = new THREE.TorusGeometry(10, 2.4, 10, 36);
  const collarMat = new THREE.MeshBasicMaterial({
    color: colorHex, transparent: true, opacity: 0.92,
  });
  const collar = new THREE.Mesh(collarGeo, collarMat);
  collar.position.y = SHAFT_H + 4;
  collar.rotation.x = Math.PI / 2;

  // Floating orb on top — the "ghost head"
  const orbGeo = new THREE.SphereGeometry(ORB_R, 28, 22);
  const orbMat = new THREE.MeshPhysicalMaterial({
    color: colorHex,
    emissive: colorHex, emissiveIntensity: isReached ? 1.6 : 1.05,
    metalness: 0.06, roughness: 0.18,
    clearcoat: 0.9, clearcoatRoughness: 0.12,
    transparent: !isReached, opacity: baseAlpha,
  });
  applyFresnelRim(orbMat, { power: 2.0, strength: 2.6 });
  const orb = new THREE.Mesh(orbGeo, orbMat);
  orb.position.y = ORB_Y;

  // Volumetric halo (additive, big and soft)
  const haloGeo = new THREE.SphereGeometry(HALO_R, 22, 16);
  const haloMat = new THREE.MeshBasicMaterial({
    color: colorHex, transparent: true, opacity: 0.22,
    depthWrite: false, blending: THREE.AdditiveBlending,
  });
  const halo = new THREE.Mesh(haloGeo, haloMat);
  halo.position.y = ORB_Y;

  // Sky beam — thin additive cone reaching up so the ghosts can be spotted
  // from a wide overview (zoom 9–10) without crowding close-up shots
  const beamGeo = new THREE.CylinderGeometry(2.0, 4.5, 140, 16, 1, true);
  beamGeo.translate(0, 70, 0);
  const beamMat = new THREE.MeshBasicMaterial({
    color: colorHex, transparent: true, opacity: 0.16,
    side: THREE.DoubleSide, depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const beam = new THREE.Mesh(beamGeo, beamMat);
  beam.position.y = ORB_Y + 30;

  // Ground ring
  const ringGeo = new THREE.RingGeometry(36, 60, 40);
  const ringMat = new THREE.MeshBasicMaterial({
    color: colorHex, transparent: true, opacity: 0.55,
    side: THREE.DoubleSide, depthWrite: false,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.5;

  group.add(ring, stake, collar, orb, halo, beam);
  group.userData = {
    stake, collar, orb, halo, ring, beam, color: colorHex, category,
    baseScale: 1.0, baseAlpha, orbY: ORB_Y,
  };
  return group;
}

// 3D route tube — extrudes a lng/lat path into a glowing raised ribbon
// with a time-scrolling emissive dash pattern (GPU-side, no per-frame
// geometry rebuilds). `coords` is an array of [lng, lat] pairs.
function makeRouteTube(coords, { color, altitude = 14, radius = 9, segments = 240 }) {
  const pts = coords.map(ll => lngLatToWorld(ll, altitude));
  const curve = new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.25);
  const geo = new THREE.TubeGeometry(curve, segments, radius, 10, false);

  const mat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    uniforms: {
      uColor:   { value: new THREE.Color(color) },
      uTime:    { value: 0 },
      uSpeed:   { value: 0.55 },
      uDashGap: { value: 0.055 },
      uGlow:    { value: 1.6 },
    },
    vertexShader: `
      varying vec2 vUv;
      varying vec3 vWorldNormal;
      varying vec3 vViewDir;
      void main() {
        vUv = uv;
        vec4 worldPos = modelMatrix * vec4(position, 1.0);
        vWorldNormal = normalize(mat3(modelMatrix) * normal);
        vViewDir = normalize(cameraPosition - worldPos.xyz);
        gl_Position = projectionMatrix * viewMatrix * worldPos;
      }
    `,
    fragmentShader: `
      varying vec2 vUv;
      varying vec3 vWorldNormal;
      varying vec3 vViewDir;
      uniform vec3  uColor;
      uniform float uTime;
      uniform float uSpeed;
      uniform float uDashGap;
      uniform float uGlow;
      void main() {
        // UV.x runs along the tube — scrolling dash pattern for direction of travel
        float u = vUv.x * 24.0 - uTime * uSpeed;
        float dash = smoothstep(0.45, 0.55, fract(u));
        float fres = pow(1.0 - clamp(dot(vWorldNormal, vViewDir), 0.0, 1.0), 2.0);
        float intensity = 0.35 + dash * 0.75 + fres * uGlow;
        gl_FragColor = vec4(uColor * intensity, 0.82 * (0.6 + 0.4 * dash));
      }
    `,
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData = { material: mat };
  return mesh;
}

function buildCairoThreeLayer() {
  return {
    id: 'three-cairo',
    type: 'custom',
    renderingMode: '3d',

    onAdd(map, gl) {
      initThreeMercator();
      this.map = map;
      this.scene = new THREE.Scene();
      // Atmospheric fog — fades only very distant 3D content so the pins at
      // the edge of wide shots stay readable. Start far out, end off-screen.
      this.scene.fog = new THREE.Fog(0x07090C, 9000, 55000);
      this.camera = new THREE.Camera();
      this.clock = new THREE.Clock();

      // Lighting rig — warm sun + cool rim + hemisphere + neon accent
      const sun = new THREE.DirectionalLight(0xFFE5C0, 1.15);
      sun.position.set(-800, 1400, -600);
      this.scene.add(sun);
      const rim = new THREE.DirectionalLight(0x88BBFF, 0.55);
      rim.position.set(600, 900, 700);
      this.scene.add(rim);
      this.scene.add(new THREE.HemisphereLight(0xA0C4FF, 0x1A1F28, 0.75));
      const neon = new THREE.PointLight(0x58A6FF, 2.2, 4500, 2);
      neon.position.set(0, 900, 0);
      this.scene.add(neon);

      // Station pins — metro post-2014 1.2×, metro pre-2014 1.0× (slightly
      // smaller and a slate-blue colour so they read as "the existing
      // network", letting the bright cyan post-2014 pins still pop). LRT 1.55×
      // (sparse desert network → bigger so the "L" reads at wide zooms),
      // BRT scales 1.1–2.0× by demand.
      this.pins = { metro: [], metroPre: [], lrt: [], brt: [] };
      METRO_POST_2014.forEach(s => {
        const p = makeStationPin({
          color: 0x58A6FF, ringColor: '#8FC6FF', letter: 'M', letterHex: '#C9E2FF',
          scale: 1.2,
        });
        p.position.copy(lngLatToWorld(s.coords));
        p.add(makeStationLabel(s.name, '#C9E2FF'));
        p.visible = false; this.scene.add(p); this.pins.metro.push(p);
      });
      METRO_PRE_2014.forEach(s => {
        // Slate / steel blue — visually distinct from post-2014 cyan so the
        // viewer can tell at a glance which stations were already there
        // versus what the $10 B programme actually built.
        const p = makeStationPin({
          color: 0x4A6FA5, ringColor: '#7C9BC4', letter: 'M', letterHex: '#B7CDE6',
          scale: 1.0,
        });
        p.position.copy(lngLatToWorld(s.coords));
        p.add(makeStationLabel(s.name, '#B7CDE6'));
        p.visible = false; this.scene.add(p); this.pins.metroPre.push(p);
      });
      LRT_STATIONS.forEach(s => {
        const p = makeStationPin({
          color: 0xB877C9, ringColor: '#D29EE0', letter: 'L', letterHex: '#EDC6F6',
          scale: 1.55,
        });
        p.position.copy(lngLatToWorld(s.coords));
        p.add(makeStationLabel(s.name, '#EDC6F6'));
        p.visible = false; this.scene.add(p); this.pins.lrt.push(p);
      });
      BRT_STATIONS.forEach(s => {
        const factor = 1.1 + Math.min(1, (s.demand || 0) / 12000) * 0.9;
        const p = makeStationPin({
          color: 0xE9C46A, ringColor: '#F4D58E', letter: 'B', letterHex: '#FBE9B5',
          scale: factor,
        });
        p.position.copy(lngLatToWorld(s.coords));
        p.add(makeStationLabel(s.name, '#FBE9B5'));
        p.visible = false; this.scene.add(p); this.pins.brt.push(p);
      });

      // Layla home (Imbaba) + Layla mobile (Maadi arrival)
      this.layla = makeLaylaAvatar();
      this.layla.position.copy(lngLatToWorld(LOCATIONS.imbaba));
      this.layla.visible = false;
      this.scene.add(this.layla);

      this.laylaMobile = makeLaylaAvatar();
      this.laylaMobile.position.copy(lngLatToWorld(LOCATIONS.maadi));
      this.laylaMobile.visible = false;
      this.scene.add(this.laylaMobile);

      // Office (Maadi) — oversized, reads as her destination anchor
      this.office = makeStationPin({
        color: 0x2A9D8F, ringColor: '#5AD4C4', letter: 'O', letterHex: '#CDEFE9', scale: 1.7,
      });
      this.office.position.copy(lngLatToWorld(LOCATIONS.maadi));
      this.office.add(makeStationLabel('MAADI OFFICE', '#CDEFE9'));
      this.office.visible = false;
      this.scene.add(this.office);

      // Vehicles — microbus + metro train, swapped per leg
      this.microbus = makeVehicle('microbus');
      this.microbus.visible = false; this.scene.add(this.microbus);
      this.metroTrain = makeVehicle('metro');
      this.metroTrain.visible = false; this.scene.add(this.metroTrain);
      this.activeVehicle = null;

      // Particle trail — circular buffer of the last N vehicle positions,
      // drawn as additive points whose size+alpha fade by per-vertex age.
      const TRAIL_N = 90;
      const trailPos   = new Float32Array(TRAIL_N * 3);
      const trailAge   = new Float32Array(TRAIL_N);
      // Park the buffer far below the ground so it's invisible until real
      // positions start streaming in (first frame after vehicle activates).
      for (let i = 0; i < TRAIL_N; i++) {
        trailPos[i * 3 + 1] = -1e6;
        trailAge[i] = 1.0;
      }
      const trailGeo = new THREE.BufferGeometry();
      trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));
      trailGeo.setAttribute('aAge',     new THREE.BufferAttribute(trailAge, 1));
      const trailMat = new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        uniforms: { uColor: { value: new THREE.Color(0xFFD89C) } },
        vertexShader: `
          attribute float aAge;
          varying float vAge;
          void main() {
            vAge = aAge;
            vec4 mv = modelViewMatrix * vec4(position, 1.0);
            // Size attenuates with distance AND fades with age.
            gl_PointSize = 22.0 * (1.0 - aAge) * (300.0 / -mv.z);
            gl_Position = projectionMatrix * mv;
          }
        `,
        fragmentShader: `
          varying float vAge;
          uniform vec3 uColor;
          void main() {
            vec2 cxy = 2.0 * gl_PointCoord - 1.0;
            float r = dot(cxy, cxy);
            if (r > 1.0) discard;
            float alpha = (1.0 - vAge) * (1.0 - r) * 0.75;
            gl_FragColor = vec4(uColor, alpha);
          }
        `,
      });
      this.trailPoints = new THREE.Points(trailGeo, trailMat);
      this.trailPoints.frustumCulled = false;
      this.scene.add(this.trailPoints);
      this._trail = {
        n: TRAIL_N, head: 0, positions: trailPos, ages: trailAge,
        geo: trailGeo, mat: trailMat,
      };

      // Phase-1 ghost terminals — 115 small 3D markers in {stranded, marginal,
      // reached} categories. They live in a single group so we can toggle the
      // whole swarm with one visibility flip and apply LOD scaling per-frame.
      this.ghosts = [];
      this.ghostsGroup = new THREE.Group();
      this.ghostsGroup.visible = false;
      INFORMAL_TERMINALS.forEach(([lng, lat, dist_m, cat]) => {
        const m = makeGhostMarker(cat);
        m.position.copy(lngLatToWorld([lng, lat]));
        m.userData.dist_m = dist_m;
        this.ghostsGroup.add(m);
        this.ghosts.push(m);
      });
      this.scene.add(this.ghostsGroup);

      // 3D extruded route ribbons — raised tubes with GPU-scrolling dash
      this.masariTube = makeRouteTube(MASARI_ROUTE, {
        color: 0x58A6FF, altitude: 16, radius: 10, segments: 280,
      });
      this.masariTube.visible = false;
      this.scene.add(this.masariTube);

      this.laylaTripTube = makeRouteTube(LAYLA_TRIP_ROUTE, {
        color: 0xE86F51, altitude: 14, radius: 9, segments: 260,
      });
      this.laylaTripTube.visible = false;
      this.scene.add(this.laylaTripTube);

      // Renderer — reuses MapLibre's existing gl context
      this.renderer = new THREE.WebGLRenderer({
        canvas: map.getCanvas(),
        context: gl,
        antialias: true,
        alpha: true,
      });
      this.renderer.autoClear = false;
      this.renderer.outputColorSpace = THREE.LinearSRGBColorSpace;
      this.renderer.toneMapping = THREE.NoToneMapping;

      // Procedural PBR environment → all MeshPhysicalMaterials (orbs, vehicle
      // chassis, shafts) pick this up as a reflection source. PMREM handles
      // the roughness-prefiltering so smooth surfaces get crisp reflections
      // and rough ones get diffuse IBL.
      this.envMap = buildProceduralEnvMap(this.renderer);
      this.scene.environment = this.envMap;
    },

    setPinGroupVisible(group, v) {
      const now = performance.now();
      this.pins[group]?.forEach((p, i) => {
        const was = p.visible;
        p.visible = v;
        // Stagger spawn-in per index so large groups animate as a cascade,
        // not a single pop. i*35 ms = 24 pins span ~840 ms which looks alive
        // but doesn't delay the last pin long enough to be noticed.
        if (v && !was) p.userData.spawnAt = now + i * 35;
      });
      this.map?.triggerRepaint();
    },
    setLaylaHomeVisible(v) {
      if (v && !this.layla.visible) this.layla.userData.spawnAt = performance.now();
      this.layla.visible = v; this.map?.triggerRepaint();
    },
    setLaylaMobileVisible(v) {
      if (v && !this.laylaMobile.visible) this.laylaMobile.userData.spawnAt = performance.now();
      this.laylaMobile.visible = v; this.map?.triggerRepaint();
    },
    setOfficeVisible(v) {
      if (v && !this.office.visible) this.office.userData.spawnAt = performance.now();
      this.office.visible = v; this.map?.triggerRepaint();
    },

    setVehicle(kind, pose) {
      const target = kind === 'metro' ? this.metroTrain : this.microbus;
      const other  = kind === 'metro' ? this.microbus   : this.metroTrain;
      if (pose) {
        const targetPos = lngLatToWorld(pose.lngLat, 8);
        // MapLibre bearing = 0°N, CW. Three.js Y rotation is right-handed
        // (CCW, +X→+Z). Heading of +X (front of model) toward compass bearing:
        //   rot_y = -(bearing - 90) · π/180   (so bearing=0 → rot_y=+π/2 = north)
        const targetRot = -(pose.bearing - 90) * Math.PI / 180;

        // First placement after a model swap → snap (no inertia across swaps).
        if (this.activeVehicle !== target) {
          target.position.copy(targetPos);
          target.rotation.y = targetRot;
        } else {
          // Micro-inertia: a tight LERP on position and wrap-safe on rotation.
          // The source bearing is already smoothed; this kills residual frame
          // jitter when the map redraws at irregular intervals.
          target.position.lerp(targetPos, 0.55);
          const cur = target.rotation.y;
          const diff = ((targetRot - cur + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
          target.rotation.y = cur + diff * 0.35;
        }
      }
      target.visible = true;
      other.visible = false;
      this.activeVehicle = target;
      this.map?.triggerRepaint();
    },
    hideVehicles() {
      this.microbus.visible = false;
      this.metroTrain.visible = false;
      this.activeVehicle = null;
      this.map?.triggerRepaint();
    },

    syncScene(scene) {
      const v = new Set(scene.visible || []);
      this.setPinGroupVisible('metro',    v.has('metro-icons'));
      this.setPinGroupVisible('metroPre', v.has('metro-pre-icons'));
      this.setPinGroupVisible('lrt',      v.has('lrt-icons'));
      this.setPinGroupVisible('brt',      v.has('brt-icons'));
      this.setLaylaHomeVisible(v.has('layla-home-icon'));
      this.setLaylaMobileVisible(v.has('layla-mobile-icon'));
      this.setOfficeVisible(v.has('office-icon'));
      this.masariTube.visible     = v.has('masari-glow')     || v.has('masari-inner');
      this.laylaTripTube.visible  = v.has('layla-trip-glow') || v.has('layla-trip-inner');
      // Ghost terminals are an analytical overlay — only show them when a
      // scene EXPLICITLY needs them (key 'informal-layer' in scene.visible).
      // The looser 'informal-halo' key was only ambient glow and shouldn't
      // pull the full 115-marker swarm onto intimate scenes (e.g. Scene 1).
      // Scenes that show ghosts: Prologue (0), Real Journey (3), The Gap (5),
      //   The Mawfaq (7), BRT × Demand (10), Q18b Verdict (11).
      const showGhosts = v.has('informal-layer');
      if (showGhosts && !this.ghostsGroup.visible) this._ghostSpawnAt = performance.now();
      this.ghostsGroup.visible = showGhosts;
      if (!v.has('masari-car') && !v.has('layla-trip-car')) this.hideVehicles();
    },

    render(gl, args) {
      const t = this.clock.getElapsedTime();

      // Scroll the route tube dashes (GPU-side uniform update only)
      if (this.masariTube.visible)    this.masariTube.userData.material.uniforms.uTime.value = t;
      if (this.laylaTripTube.visible) this.laylaTripTube.userData.material.uniforms.uTime.value = t;

      // Zoom-adaptive LOD for pins and avatars
      const zoom = this.map ? this.map.getZoom() : 13;
      const zoomK = Math.max(0.7, Math.min(3.0, Math.pow(2, (13 - zoom) * 0.3)));

      // Labels fade in only at closer zooms so wide shots stay uncluttered.
      // zoom 11 → 0 opacity; zoom 13.5+ → 1 opacity.
      const labelOpacity = Math.max(0, Math.min(1, (zoom - 11) * 0.4));

      const nowMs = performance.now();
      // Spawn-in easing: per-pin 0→1 over 750 ms, ease-out-cubic
      const spawn = (obj) => {
        const at = obj.userData.spawnAt;
        if (at === undefined) return 1;
        const p = Math.min(1, Math.max(0, (nowMs - at) / 750));
        const e = 1 - Math.pow(1 - p, 3);
        if (p >= 1) delete obj.userData.spawnAt; // stop tracking
        return e;
      };

      // Pin pulse — emissive breathe + orbit spin + beam flicker + LOD + spawn
      const pulse = (arr) => arr.forEach((p, i) => {
        if (!p.visible) return;
        const phase = t * 2.2 + i * 0.35;
        p.userData.orb.material.emissiveIntensity = 1.1 + 0.5 * (0.5 + 0.5 * Math.sin(phase));
        p.userData.halo.material.opacity         = 0.24 + 0.18 * (0.5 + 0.5 * Math.sin(phase * 0.7));
        p.userData.ring.material.opacity         = 0.42 + 0.22 * (0.5 + 0.5 * Math.sin(phase * 1.1));
        if (p.userData.orbit) {
          p.userData.orbit.rotation.z = t * 0.55 + i * 0.2;
          p.userData.orbit.rotation.x = Math.PI / 2.4 + Math.sin(t * 0.35 + i) * 0.25;
        }
        if (p.userData.beam) {
          p.userData.beam.material.opacity = 0.16 + 0.12 * (0.5 + 0.5 * Math.sin(phase * 0.6));
        }
        // Find the label sprite child (if any) and fade it with zoom
        for (const child of p.children) {
          if (child.userData?.isStationLabel) {
            child.material.opacity = labelOpacity * spawn(p);
            break;
          }
        }
        const b = p.userData.baseScale || 1;
        p.scale.setScalar(b * zoomK * spawn(p));
      });
      pulse(this.pins.metro); pulse(this.pins.metroPre);
      pulse(this.pins.lrt); pulse(this.pins.brt);
      if (this.office.visible) pulse([this.office]);

      // Layla — slow turn + body bob + arm sway + scarf ripple + LOD + spawn
      [this.layla, this.laylaMobile].forEach(ly => {
        if (!ly.visible) return;
        ly.userData.figure.rotation.y = t * 0.35;
        const bob = Math.sin(t * 1.6) * 3;
        ly.userData.figure.position.y = bob;
        ly.userData.armPivotL.rotation.x = Math.sin(t * 1.4) * 0.18;
        ly.userData.armPivotR.rotation.x = -Math.sin(t * 1.4) * 0.18;
        ly.userData.scarf.rotation.z = Math.sin(t * 0.9) * 0.12;
        ly.userData.ring.material.opacity = 0.22 + 0.16 * (0.5 + 0.5 * Math.sin(t * 1.4));
        ly.userData.glow.material.opacity = 0.08 + 0.10 * (0.5 + 0.5 * Math.sin(t * 1.9));
        ly.scale.setScalar(1.9 * zoomK * spawn(ly));
      });

      // Vehicle wheels — roll proportional to distance moved, so they STOP
      // when the vehicle pauses at a transfer (real wheels don't keep spinning).
      if (this.activeVehicle) {
        const pos = this.activeVehicle.position;
        const prev = this._lastVehiclePos;
        let metersMoved = 0;
        if (prev && this._lastVehicleRef === this.activeVehicle) {
          const dx = pos.x - prev.x, dz = pos.z - prev.z;
          metersMoved = Math.sqrt(dx * dx + dz * dz);
        }
        // Circumference of wheel (radius 8m in scene units) → radians per meter
        const wheelR = 8;
        const deltaRot = metersMoved / wheelR;
        this._wheelAngle = (this._wheelAngle || 0) + deltaRot;
        this.activeVehicle.userData.cars.forEach(car => {
          car.userData.wheels.forEach(w => { w.rotation.x = this._wheelAngle; });
        });
        this.activeVehicle.userData.beams.forEach(b => {
          b.material.opacity = 0.18 + 0.08 * (0.5 + 0.5 * Math.sin(t * 8));
        });

        // ── Particle trail ─────────────────────────────────────────────
        // Each frame we (a) age every existing point, (b) if the vehicle
        // actually moved, drop a fresh point at its current position.
        const tr = this._trail;
        for (let i = 0; i < tr.n; i++) tr.ages[i] = Math.min(1, tr.ages[i] + 0.015);
        if (metersMoved > 0.3) {
          const head = tr.head;
          tr.positions[head * 3]     = pos.x;
          tr.positions[head * 3 + 1] = pos.y + 6;   // hover just above ground
          tr.positions[head * 3 + 2] = pos.z;
          tr.ages[head] = 0;
          tr.head = (head + 1) % tr.n;
        }
        tr.geo.attributes.position.needsUpdate = true;
        tr.geo.attributes.aAge.needsUpdate = true;
        // Tint the trail by the current leg — microbus = coral, metro = blue.
        tr.mat.uniforms.uColor.value.set(
          this.activeVehicle === this.metroTrain ? 0x9FCFFF : 0xFFB992
        );
        this.trailPoints.visible = true;

        this._lastVehiclePos = pos.clone();
        this._lastVehicleRef = this.activeVehicle;
      } else {
        this._lastVehiclePos = null;
        this._lastVehicleRef = null;
        // Fade the trail out quickly when the vehicle is gone
        if (this._trail) {
          const tr = this._trail;
          for (let i = 0; i < tr.n; i++) tr.ages[i] = Math.min(1, tr.ages[i] + 0.05);
          tr.geo.attributes.aAge.needsUpdate = true;
          this.trailPoints.visible = tr.ages.some(a => a < 1);
        }
      }

      // ── Ghost-terminal swarm animation: per-marker bob + LOD scaling +
      // staggered spawn-in when the swarm becomes visible. Reached ghosts
      // (the 9 "wins" within 1 km of new metro) pulse brighter and bigger.
      // Stranded ghosts pulse slower with a softer "dying signal" emissive.
      if (this.ghostsGroup.visible) {
        const spawnedAt = this._ghostSpawnAt || 0;
        const sinceSpawn = nowMs - spawnedAt;
        // Ghost markers themselves are smaller-scale than station pins, so
        // they get their own baseline multiplier (1.6×) on top of the global
        // zoom LOD — visible from zoom 9, never overpowering the bigger pins.
        const ghostBase = 1.6;
        for (let i = 0; i < this.ghosts.length; i++) {
          const g = this.ghosts[i];
          const ud = g.userData;
          const isReached = ud.category === 'reached';
          // Stagger spawn — reached ghosts pop up first (i*14 ms), then the
          // stranded swarm cascades across the city (200 + i*14 ms).
          const delay = isReached ? i * 14 : 200 + i * 14;
          const sp = Math.min(1, Math.max(0, (sinceSpawn - delay) / 800));
          const ease = 1 - Math.pow(1 - sp, 3);
          const phase = t * (isReached ? 2.4 : 1.5) + i * 0.27;
          const bob = Math.sin(phase) * (isReached ? 4 : 2.2);
          ud.orb.position.y  = ud.orbY + bob;
          ud.halo.position.y = ud.orbY + bob;
          // Emissive breath — reached ghosts breathe stronger
          const breath = 0.5 + 0.5 * Math.sin(phase);
          ud.orb.material.emissiveIntensity =
            (isReached ? 1.6 : 1.0) + (isReached ? 0.7 : 0.5) * breath;
          ud.halo.material.opacity = 0.18 + 0.16 * breath;
          ud.ring.material.opacity = 0.40 + 0.20 * (0.5 + 0.5 * Math.sin(phase * 0.6));
          ud.beam.material.opacity = 0.12 + 0.10 * (0.5 + 0.5 * Math.sin(phase * 0.55));
          // LOD scaling × ghost-baseline × spawn-in ease
          g.scale.setScalar(ghostBase * zoomK * ease);
        }
      }

      // Compose camera: mapMatrix * (T · S · rotX)
      const matrix = Array.isArray(args)
        ? args
        : (args?.defaultProjectionData?.mainMatrix || args?.matrix);
      if (!matrix) return;
      const rotX = new THREE.Matrix4().makeRotationAxis(new THREE.Vector3(1, 0, 0), Math.PI / 2);
      const mapMat = new THREE.Matrix4().fromArray(matrix);
      const localMat = new THREE.Matrix4()
        .makeTranslation(ORIGIN_MERC.x, ORIGIN_MERC.y, ORIGIN_MERC.z)
        .multiply(new THREE.Matrix4().makeScale(METER_TO_MERC, -METER_TO_MERC, METER_TO_MERC))
        .multiply(rotX);
      this.camera.projectionMatrix = mapMat.multiply(localMat);

      this.renderer.resetState();
      this.renderer.render(this.scene, this.camera);

      // Keep the frame loop alive while any dynamic object is on screen
      if (this.hasLiveObjects()) this.map.triggerRepaint();
    },

    hasLiveObjects() {
      return this.activeVehicle !== null
          || (this.trailPoints && this.trailPoints.visible)
          || this.layla.visible || this.laylaMobile.visible
          || this.office.visible
          || this.masariTube.visible || this.laylaTripTube.visible
          || this.ghostsGroup.visible
          || this.pins.metro.some(p => p.visible)
          || this.pins.metroPre.some(p => p.visible)
          || this.pins.lrt.some(p => p.visible)
          || this.pins.brt.some(p => p.visible);
    },

    onRemove() {
      this.scene?.traverse(obj => {
        if (obj.isMesh) {
          obj.geometry?.dispose();
          const disposeMat = (m) => { m.map?.dispose?.(); m.dispose?.(); };
          if (Array.isArray(obj.material)) obj.material.forEach(disposeMat);
          else if (obj.material) disposeMat(obj.material);
        }
      });
      this.scene = null;
      this.renderer = null;
    },
  };
}

// ═══════════════════════════════════════════════════════════════════════
//  CIRCLE POLYGON (for LRT / BRT catchment overlays)
// ═══════════════════════════════════════════════════════════════════════
function circlePolygon([lng, lat], km) {
  const points = 64;
  const coords = [];
  const latR = km / 111;
  const lngR = km / (111 * Math.cos(lat * Math.PI / 180));
  for (let i = 0; i <= points; i++) {
    const angle = (i / points) * 2 * Math.PI;
    coords.push([lng + lngR * Math.cos(angle), lat + latR * Math.sin(angle)]);
  }
  return coords;
}

// ═══════════════════════════════════════════════════════════════════════
//  ANIMATED NUMBER HOOK
// ═══════════════════════════════════════════════════════════════════════
function useAnimatedNumber(target, { duration = 1200, decimals = 0, format = null } = {}) {
  const [value, setValue] = useState(typeof target === 'number' ? 0 : target);
  useEffect(() => {
    if (typeof target !== 'number') { setValue(target); return; }
    const start = typeof value === 'number' ? value : 0;
    const diff = target - start;
    const t0 = performance.now();
    let raf;
    const tick = (t) => {
      const p = Math.min((t - t0) / duration, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      setValue(start + diff * eased);
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target, duration]);
  if (typeof value !== 'number') return value;
  if (format === 'k' && Math.abs(value) >= 1000) {
    return (value / 1000).toFixed(0) + 'K';
  }
  if (format === 'billion') return value.toFixed(0);
  return decimals > 0 ? value.toFixed(decimals) : Math.round(value).toLocaleString();
}

}
