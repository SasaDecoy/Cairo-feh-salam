// ═══════════════════════════════════════════════════════════════════════
//  SCENE CONTROLLER · applies a scene to the map
// ═══════════════════════════════════════════════════════════════════════
function applyScene(map, scene) {
  const isMobile = window.innerWidth <= 900;
  const padding = isMobile
    ? { top: 92, right: 24, bottom: 112, left: 24 }
    : {
        top: 96,
        right: 42,
        bottom: 108,
        left: scene.panelFocus === 'centered' ? 72 : Math.min(Math.max(window.innerWidth * 0.30, 320), 430),
      };
  // Camera fly
  map.flyTo({
    center: scene.center,
    zoom: scene.zoom,
    pitch: scene.pitch,
    bearing: scene.bearing,
    padding,
    speed: scene.transition?.speed || 0.7,
    curve: scene.transition?.curve || 1.3,
    easing: (t) => 1 - Math.pow(1 - t, 3),
    essential: true,
  });
  // Layer opacity toggles
  const visible = new Set(scene.visible || []);
  const dim = new Set(scene.dim || []);
  ALL_LAYER_IDS.forEach(id => {
    if (!map.getLayer(id)) return;
    const op = opacityProp(id, map);
    const opStroke = opacityPropStroke(id, map);
    let target = 0;
    if (visible.has(id)) target = 1;
    else if (dim.has(id)) target = 0.28;
    if (op)       map.setPaintProperty(id, op, target);
    if (opStroke) map.setPaintProperty(id, opStroke, target);
  });

  // scene.visible still carries the old 2D icon IDs as semantic keys; we use
  // them to drive the Three.js scene graph (pins, avatars, vehicles).
  if (map._threeLayer) map._threeLayer.syncScene(scene);

  // Force a repaint so opacity changes appear immediately even when the map
  // is not moving (otherwise MapLibre can skip a frame and the fade looks stuck).
  map.triggerRepaint();
}

function segmentBearing(route, index) {
  const current = route[index];
  const next = route[Math.min(index + 1, route.length - 1)];
  const prev = route[Math.max(index - 1, 0)];
  const from = index < route.length - 1 ? current : prev;
  const to = index < route.length - 1 ? next : current;
  return turf.bearing(turf.point(from), turf.point(to));
}

// ── Cinematic follow-camera ─────────────────────────────────────────────
// Called once per animation frame. Chases the vehicle smoothly: centers
// slightly ahead of it, rotates the map so direction-of-travel is "up",
// and eases zoom/pitch toward cinematic values. Everything is a per-axis
// LERP so panning/tilting never snaps — the camera feels like a drone.
function cinematicFollow(map, lngLat, bearingDeg, elapsed, opts = {}) {
  const {
    warmup      = 350,   // ms — short opening then chase. Was 650; reduced so
                         // the user doesn't sit on a wide static shot waiting.
    leadKm      = 0.14,  // look-ahead distance along bearing
    targetZoom  = 14.3,
    targetPitch = 60,
    centerBlend = 0.10,
    bearingBlend= 0.055,
    zoomBlend   = 0.045,
    pitchBlend  = 0.04,
  } = opts;

  if (elapsed < warmup) return;

  // Point ahead of the vehicle — camera "looks forward"
  const ahead = turf.destination(turf.point(lngLat), leadKm, bearingDeg, { units: 'kilometers' });
  const [lng, lat] = ahead.geometry.coordinates;

  const c = map.getCenter();
  map.setCenter([
    c.lng + (lng - c.lng) * centerBlend,
    c.lat + (lat - c.lat) * centerBlend,
  ]);

  // Wrap-safe bearing LERP (shortest angular path)
  const curB = map.getBearing();
  const delta = ((bearingDeg - curB + 540) % 360) - 180;
  map.setBearing(curB + delta * bearingBlend);

  // Zoom + pitch ease toward cinematic targets
  const curZ = map.getZoom();
  map.setZoom(curZ + (targetZoom - curZ) * zoomBlend);
  const curP = map.getPitch();
  map.setPitch(curP + (targetPitch - curP) * pitchBlend);
}

// ── Look-ahead bearing + temporal LERP ──────────────────────────────────
// The raw per-segment bearing snaps at every route vertex (and jumps at
// leg transitions). Real vehicles take corners with a turning radius.
// We emulate that with two tricks stacked:
//   1. LOOK-AHEAD: the target bearing is the compass direction from the
//      current position to a point ~40 m further along the FULL route
//      (`overallLine` — all legs concatenated). Near a corner this vector
//      naturally rotates through the arc rather than snapping at the apex.
//   2. TEMPORAL SMOOTHING: wrap-safe LERP from last frame's bearing to the
//      target. This kills micro-jitter and models the yaw inertia of a bus.
//
// Returns the smoothed bearing in degrees; caller persists state via
// `bearingStateRef` (so hot re-renders don't reset the filter).
function smoothedLookAheadBearing({
  overallLine, totalRouteKm, point, traveledKm,
  bearingStateRef, lookAheadKm = 0.04, lerp = 0.18,
}) {
  const clampedAhead = Math.min(traveledKm + lookAheadKm, totalRouteKm - 0.0005);
  const aheadPt = turf.along(overallLine, Math.max(0, clampedAhead), { units: 'kilometers' });
  let raw = turf.bearing(point, aheadPt);
  if (!Number.isFinite(raw)) raw = bearingStateRef.current ?? 0;

  const cur = bearingStateRef.current;
  if (cur === null || cur === undefined) {
    bearingStateRef.current = raw;
    return raw;
  }
  const diff = ((raw - cur + 540) % 360) - 180;
  const next = cur + diff * lerp;
  bearingStateRef.current = next;
  return next;
}

// ═══════════════════════════════════════════════════════════════════════
//  MULTI-LEG MASARI ANIMATION (scene 12)
// ═══════════════════════════════════════════════════════════════════════
function useMasariAnimation(map, active) {
  const rafRef = useRef(null);
  const startedAtRef = useRef(0);
  const bearingRef = useRef(null);

  useEffect(() => {
    if (!map || !active) {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      const transferSource = map?.getSource?.('masari-transfer-src');
      if (transferSource) {
        transferSource.setData({ type: 'FeatureCollection', features: [] });
      }
      return;
    }
    // FRESH-START RESET — see comments in useLaylaTripAnimation. Re-entering
    // the scene (next → prev) leaves stale state in the 3D layer that can
    // suppress the vehicle on the second activation; reset before scheduling.
    if (map._threeLayer) {
      map._threeLayer.hideVehicles();
      const tr = map._threeLayer._trail;
      if (tr) {
        for (let i = 0; i < tr.n; i++) {
          tr.positions[i * 3 + 1] = -1e6;
          tr.ages[i] = 1.0;
        }
        tr.geo.attributes.position.needsUpdate = true;
        tr.geo.attributes.aAge.needsUpdate = true;
        tr.head = 0;
      }
      map._threeLayer._lastVehiclePos = null;
      map._threeLayer._lastVehicleRef = null;
      map._threeLayer._wheelAngle = 0;
    }

    const legs = MASARI_LEGS.map((leg) => ({
      ...leg,
      line: turf.lineString(leg.route),
      lengthKm: turf.length(turf.lineString(leg.route), { units: 'kilometers' }),
    }));
    const totalLen = legs.reduce((sum, leg) => sum + leg.lengthKm, 0);
    const durationMs = legs.reduce((sum, leg) => sum + leg.durationMs + leg.pauseMs, 0);
    // Full-route geometry for smooth look-ahead bearing (concat of all legs).
    const overallLine = turf.lineString(MASARI_ROUTE);
    const totalRouteKm = turf.length(overallLine, { units: 'kilometers' });
    bearingRef.current = null; // fresh filter on each activation
    startedAtRef.current = performance.now();

    const progSource     = map.getSource('masari-progress-src');
    const transferSource = map.getSource('masari-transfer-src');
    if (!progSource || !transferSource) return;
    progSource.setData({
      type: 'Feature',
      geometry: { type: 'LineString', coordinates: [MASARI_ROUTE[0], MASARI_ROUTE[0]] },
      properties: {},
    });
    transferSource.setData({ type: 'FeatureCollection', features: [] });
    map.setPaintProperty('masari-transfer-pulse', 'circle-opacity', 0);

    // Place the 3D vehicle at the start before the first RAF so the user
    // sees it immediately when the scene opens.
    if (map._threeLayer) {
      const startPt = MASARI_LEGS[0].route[0];
      const nextPt  = MASARI_LEGS[0].route[1] || startPt;
      const initBearing = turf.bearing(turf.point(startPt), turf.point(nextPt));
      bearingRef.current = initBearing;
      map._threeLayer.setVehicle('microbus', { lngLat: startPt, bearing: initBearing });
    }

    const showTransfer = (coords, color) => {
      transferSource.setData({
        type: 'FeatureCollection',
        features: [{
          type: 'Feature',
          geometry: { type: 'Point', coordinates: coords },
          properties: { color },
        }],
      });
      map.setPaintProperty('masari-transfer-pulse', 'circle-opacity', 0.55);
      map.setPaintProperty('masari-transfer-pulse', 'circle-radius', 18);
    };

    const step = (now) => {
      try {
        const elapsed = now - startedAtRef.current;
        let remaining = Math.min(elapsed, durationMs);
        let traveledKm = 0;
        let activeLeg = legs[0];
        let point = turf.point(activeLeg.route[0]);
        let paused = false;

        for (const leg of legs) {
          activeLeg = leg;
          if (remaining <= leg.durationMs) {
            let localT = remaining / leg.durationMs;
            localT = localT < 0.5
              ? 4 * localT * localT * localT
              : 1 - Math.pow(-2 * localT + 2, 3) / 2;
            const distanceKm = localT * leg.lengthKm;
            point = turf.along(leg.line, distanceKm, { units: 'kilometers' });
            traveledKm += distanceKm;
            break;
          }
          remaining -= leg.durationMs;
          traveledKm += leg.lengthKm;
          point = turf.point(leg.route[leg.route.length - 1]);
          if (remaining <= leg.pauseMs) { paused = true; break; }
          remaining -= leg.pauseMs;
        }

        const bearing = smoothedLookAheadBearing({
          overallLine, totalRouteKm,
          point, traveledKm,
          bearingStateRef: bearingRef,
          lookAheadKm: 0.045,
          lerp: paused ? 0.06 : 0.16,
        });

        map.setPaintProperty('masari-progress', 'line-color', activeLeg.color);
        map.setPaintProperty('masari-transfer-pulse', 'circle-color', activeLeg.color);

        if (map._threeLayer) {
          map._threeLayer.setVehicle(
            activeLeg.mode === 'METRO' ? 'metro' : 'microbus',
            { lngLat: point.geometry.coordinates, bearing },
          );
        }

        cinematicFollow(map, point.geometry.coordinates, bearing, elapsed, {
          warmup: 0, targetZoom: 13.8, targetPitch: 58, leadKm: 0.18,
          centerBlend: 0.13, zoomBlend: 0.06, bearingBlend: 0.07, pitchBlend: 0.05,
        });

        if (traveledKm > 0.001) {
          const sliced = turf.lineSliceAlong(overallLine, 0, traveledKm, { units: 'kilometers' });
          progSource.setData(sliced);
        }

        if (paused) {
          showTransfer(point.geometry.coordinates, activeLeg.color);
          map.setPaintProperty('masari-transfer-pulse', 'circle-radius', 18 + 22 * Math.sin(now / 240));
        } else {
          transferSource.setData({ type: 'FeatureCollection', features: [] });
          map.setPaintProperty('masari-transfer-pulse', 'circle-opacity', 0);
        }

        if (elapsed < durationMs) {
          rafRef.current = requestAnimationFrame(step);
        } else {
          transferSource.setData({
            type: 'FeatureCollection',
            features: [{
              type: 'Feature',
              geometry: { type: 'Point', coordinates: MASARI_TRANSFERS[2].coords },
              properties: { color: '#2A9D8F' },
            }],
          });
          map.setPaintProperty('masari-transfer-pulse', 'circle-color', '#2A9D8F');
          map.setPaintProperty('masari-transfer-pulse', 'circle-opacity', 0.55);
          map.setPaintProperty('masari-transfer-pulse', 'circle-radius', 28);
        }
      } catch (err) {
        console.error('[masari step] error:', err);
        // Keep the RAF chain alive so a transient hiccup doesn't kill the trip
        rafRef.current = requestAnimationFrame(step);
      }
    };
    console.log('[masari] effect activated, scheduling first RAF');
    rafRef.current = requestAnimationFrame(step);
    return () => {
      cancelAnimationFrame(rafRef.current);
      transferSource.setData({ type: 'FeatureCollection', features: [] });
      map.setPaintProperty('masari-transfer-pulse', 'circle-opacity', 0);
      map._threeLayer?.hideVehicles();
    };
  }, [map, active]);
}

// ═══════════════════════════════════════════════════════════════════════
//  LAYLA CHAOS TRIP ANIMATION (scene 3)
//  Same multi-leg engine as Masari but drives layla-trip-* sources.
// ═══════════════════════════════════════════════════════════════════════
function useLaylaTripAnimation(map, active) {
  const rafRef = useRef(null);
  const startedAtRef = useRef(0);
  const bearingRef = useRef(null);

  useEffect(() => {
    if (!map || !active) {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      const transferSource = map?.getSource?.('layla-trip-transfer-src');
      if (transferSource) transferSource.setData({ type: 'FeatureCollection', features: [] });
      return;
    }
    // FRESH-START RESET — when re-entering the scene (next → prev nav), the
    // 3D layer can hold stale state from the previous run that prevents the
    // vehicle from re-appearing. Force a clean slate before scheduling RAF.
    if (map._threeLayer) {
      map._threeLayer.hideVehicles();
      // Also blank the trail buffer so it doesn't draw a long ghost stretch
      // from the last vehicle parking spot to the new starting point.
      const tr = map._threeLayer._trail;
      if (tr) {
        for (let i = 0; i < tr.n; i++) {
          tr.positions[i * 3 + 1] = -1e6; // park below ground (invisible)
          tr.ages[i] = 1.0;
        }
        tr.geo.attributes.position.needsUpdate = true;
        tr.geo.attributes.aAge.needsUpdate = true;
        tr.head = 0;
      }
      map._threeLayer._lastVehiclePos = null;
      map._threeLayer._lastVehicleRef = null;
      map._threeLayer._wheelAngle = 0;
    }

    const legs = LAYLA_TRIP_LEGS.map((leg) => ({
      ...leg,
      line: turf.lineString(leg.route),
      lengthKm: turf.length(turf.lineString(leg.route), { units: 'kilometers' }),
    }));
    const durationMs = legs.reduce((sum, leg) => sum + leg.durationMs + leg.pauseMs, 0);
    const overallLine = turf.lineString(LAYLA_TRIP_ROUTE);
    const totalRouteKm = turf.length(overallLine, { units: 'kilometers' });
    bearingRef.current = null;
    startedAtRef.current = performance.now();

    const progSource     = map.getSource('layla-trip-progress-src');
    const transferSource = map.getSource('layla-trip-transfer-src');
    if (!progSource || !transferSource) return;

    progSource.setData({
      type: 'Feature',
      geometry: { type: 'LineString', coordinates: [LAYLA_TRIP_ROUTE[0], LAYLA_TRIP_ROUTE[0]] },
      properties: {},
    });
    transferSource.setData({ type: 'FeatureCollection', features: [] });
    map.setPaintProperty('layla-trip-transfer-pulse', 'circle-opacity', 0);

    // Place the 3D vehicle at the start (microbus, leg 1) BEFORE the first
    // RAF — guarantees the user sees it the instant the scene opens, not
    // only after the first animation frame fires (which can be delayed if
    // the tab was backgrounded or RAFs were throttled).
    if (map._threeLayer) {
      const startPt = LAYLA_TRIP_LEGS[0].route[0];
      const nextPt  = LAYLA_TRIP_LEGS[0].route[1] || startPt;
      const initBearing = turf.bearing(turf.point(startPt), turf.point(nextPt));
      bearingRef.current = initBearing;
      map._threeLayer.setVehicle('microbus', { lngLat: startPt, bearing: initBearing });
    }

    const step = (now) => {
      const elapsed = now - startedAtRef.current;
      let remaining = Math.min(elapsed, durationMs);
      let traveledKm = 0;
      let activeLeg = legs[0];
      let point = turf.point(activeLeg.route[0]);
      let paused = false;

      for (const leg of legs) {
        activeLeg = leg;
        if (remaining <= leg.durationMs) {
          let localT = remaining / leg.durationMs;
          localT = localT < 0.5
            ? 4 * localT * localT * localT
            : 1 - Math.pow(-2 * localT + 2, 3) / 2;
          const distanceKm = localT * leg.lengthKm;
          point = turf.along(leg.line, distanceKm, { units: 'kilometers' });
          traveledKm += distanceKm;
          break;
        }
        remaining -= leg.durationMs;
        traveledKm += leg.lengthKm;
        point = turf.point(leg.route[leg.route.length - 1]);
        if (remaining <= leg.pauseMs) { paused = true; break; }
        remaining -= leg.pauseMs;
      }

      // Real-vehicle smoothing — look-ahead bearing + LERP (same as masari)
      const bearing = smoothedLookAheadBearing({
        overallLine, totalRouteKm,
        point, traveledKm,
        bearingStateRef: bearingRef,
        lookAheadKm: 0.04,
        lerp: paused ? 0.05 : 0.15,
      });

      map.setPaintProperty('layla-trip-progress', 'line-color', activeLeg.color);

      // Drive the 3D vehicle (swaps between metro train ↔ microbus per leg)
      if (map._threeLayer) {
        map._threeLayer.setVehicle(
          activeLeg.mode === 'METRO' ? 'metro' : 'microbus',
          { lngLat: point.geometry.coordinates, bearing },
        );
      }

      // Cinematic camera chase — drone-style follow of the vehicle (warmup=0)
      cinematicFollow(map, point.geometry.coordinates, bearing, elapsed, {
        warmup: 0, targetZoom: 14.0, targetPitch: 60, leadKm: 0.15,
        centerBlend: 0.13, zoomBlend: 0.06, bearingBlend: 0.07, pitchBlend: 0.05,
      });

      if (traveledKm > 0.001) {
        const sliced = turf.lineSliceAlong(overallLine, 0, traveledKm, { units: 'kilometers' });
        progSource.setData(sliced);
      }

      if (paused) {
        transferSource.setData({
          type: 'FeatureCollection',
          features: [{ type: 'Feature',
                       geometry: { type: 'Point', coordinates: point.geometry.coordinates },
                       properties: { color: activeLeg.color } }],
        });
        map.setPaintProperty('layla-trip-transfer-pulse', 'circle-color', activeLeg.color);
        map.setPaintProperty('layla-trip-transfer-pulse', 'circle-opacity', 0.55);
        map.setPaintProperty('layla-trip-transfer-pulse', 'circle-radius', 20 + 24 * Math.sin(now / 260));
      } else {
        transferSource.setData({ type: 'FeatureCollection', features: [] });
        map.setPaintProperty('layla-trip-transfer-pulse', 'circle-opacity', 0);
      }

      if (elapsed < durationMs) {
        rafRef.current = requestAnimationFrame(step);
      } else {
        // settle at Maadi with a teal arrival pulse
        transferSource.setData({
          type: 'FeatureCollection',
          features: [{ type: 'Feature',
                       geometry: { type: 'Point', coordinates: LOCATIONS.maadi },
                       properties: { color: '#2A9D8F' } }],
        });
        map.setPaintProperty('layla-trip-transfer-pulse', 'circle-color', '#2A9D8F');
        map.setPaintProperty('layla-trip-transfer-pulse', 'circle-opacity', 0.55);
        map.setPaintProperty('layla-trip-transfer-pulse', 'circle-radius', 30);
      }
    };
    rafRef.current = requestAnimationFrame(step);
    return () => {
      cancelAnimationFrame(rafRef.current);
      transferSource.setData({ type: 'FeatureCollection', features: [] });
      map.setPaintProperty('layla-trip-transfer-pulse', 'circle-opacity', 0);
      map._threeLayer?.hideVehicles();
    };
  }, [map, active]);
}

      'circle-radius': ['interpolate', ['linear'], ['zoom'], 9, 18, 13, 34, 16, 48],

    paint: { 'fill-color': '#7B2D8E', 'fill-opacity': 0 },
  });
  map.addLayer({
    id: 'lrt-catchment-line', type: 'line', source: 'lrt-catch',
    paint: { 'line-color': '#B877C9', 'line-width': 1.5, 'line-opacity': 0, 'line-dasharray': [2, 2] },
  });

  // ── BRT icons + demand halo + corridor buffer ──
  map.addSource('brt', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features: BRT_STATIONS.map(s => ({
      type: 'Feature', geometry: { type: 'Point', coordinates: s.coords },
      properties: { name: s.name, demand: s.demand },
    })) },
  });
  map.addLayer({
    id: 'brt-demand-halo', type: 'circle', source: 'brt',
    paint: {
      'circle-radius': ['interpolate', ['linear'], ['get', 'demand'], 0, 10, 15000, 44],
      'circle-color': '#E9C46A',
      'circle-opacity': 0,
      'circle-blur': 1,
    },
  });
  // Guaranteed-visible BRT dots, sized by demand
  map.addLayer({
    id: 'brt-dots', type: 'circle', source: 'brt',
    paint: {
      'circle-radius': [
        'interpolate', ['linear'], ['get', 'demand'],
        0, 8, 15000, 22,
      ],
      'circle-color': '#E9C46A',
      'circle-stroke-width': 2,
      'circle-stroke-color': '#0D1117',
      'circle-opacity': 0,
      'circle-stroke-opacity': 0,
    },
  });
  // BRT corridor buffer (500 m on top-3 stations — H3 overlay)
  const top3BRT = [...BRT_STATIONS].sort((a, b) => b.demand - a.demand).slice(0, 4);
  const brtCatchFeatures = top3BRT.map(s => ({
    type: 'Feature',
    geometry: { type: 'Polygon', coordinates: [circlePolygon(s.coords, 0.5)] },
    properties: {},
  }));
  map.addSource('brt-catch', { type: 'geojson', data: { type: 'FeatureCollection', features: brtCatchFeatures } });
  map.addLayer({
    id: 'brt-catchment-fill', type: 'fill', source: 'brt-catch',
    paint: { 'fill-color': '#E9C46A', 'fill-opacity': 0 },
  });

  // ── As-the-crow-flies line ──
  map.addSource('crow-line', {
    type: 'geojson',
    data: { type: 'Feature',
            geometry: { type: 'LineString', coordinates: [LOCATIONS.imbaba, LOCATIONS.maadi] },
            properties: {} },
  });
  map.addLayer({
    id: 'crow-line-layer', type: 'line', source: 'crow-line',
    paint: {
      'line-color': '#E9C46A', 'line-width': 2,
      'line-dasharray': [2, 2], 'line-opacity': 0,
    },
  });

  // ── Gap lines (from Imbaba to nearest metro / BRT) ──
  const nearestMetro = METRO_POST_2014[21];
  const nearestBRT = BRT_STATIONS[4];
  map.addSource('gap-lines', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features: [
      { type: 'Feature', geometry: { type: 'LineString',
        coordinates: [LOCATIONS.imbaba, nearestMetro.coords] },
        properties: { label: '3.8 km to metro' } },
      { type: 'Feature', geometry: { type: 'LineString',
        coordinates: [LOCATIONS.imbaba, nearestBRT.coords] },
        properties: { label: '8 km to BRT' } },
    ] },
  });
  map.addLayer({
    id: 'gap-lines-layer', type: 'line', source: 'gap-lines',
    paint: {
      'line-color': '#E86F51', 'line-width': 2.5,
      'line-dasharray': [3, 2], 'line-opacity': 0,
    },
  });

  // ── Masari full route (glow + inner) ──
  map.addSource('masari-full', {
    type: 'geojson',
    data: { type: 'Feature', geometry: { type: 'LineString', coordinates: MASARI_ROUTE }, properties: {} },
  });
  map.addLayer({
    id: 'masari-glow', type: 'line', source: 'masari-full',
    paint: { 'line-color': '#58A6FF', 'line-width': 14, 'line-opacity': 0, 'line-blur': 3 },
    layout: { 'line-cap': 'round', 'line-join': 'round' },
  });
  map.addLayer({
    id: 'masari-inner', type: 'line', source: 'masari-full',
    paint: { 'line-color': '#C9DEF9', 'line-width': 1.2, 'line-opacity': 0, 'line-dasharray': [0.6, 1.6] },
    layout: { 'line-cap': 'round', 'line-join': 'round' },
  });

  // Progressive "travelled" portion
  map.addSource('masari-progress-src', {
    type: 'geojson',
    data: { type: 'Feature', geometry: { type: 'LineString', coordinates: [MASARI_ROUTE[0], MASARI_ROUTE[0]] }, properties: {} },
  });
  map.addLayer({
    id: 'masari-progress', type: 'line', source: 'masari-progress-src',
    paint: { 'line-color': '#E9C46A', 'line-width': 4, 'line-opacity': 0, 'line-blur': 0.3 },
    layout: { 'line-cap': 'round', 'line-join': 'round' },
  });

  map.addSource('masari-transfer-src', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features: [] },
  });
  map.addLayer({
    id: 'masari-transfer-pulse', type: 'circle', source: 'masari-transfer-src',
    paint: {
      'circle-radius': 18,
      'circle-color': '#E9C46A',
      'circle-opacity': 0,
      'circle-blur': 1.15,
    },
  });

  // ── Layla's CHAOS trip (Scene 3) — the real 83-minute journey ──
  // Route glow + inner (same two-layer pattern as masari)
  map.addSource('layla-trip-src', {
    type: 'geojson',
    data: { type: 'Feature',
            geometry: { type: 'LineString', coordinates: LAYLA_TRIP_ROUTE },
            properties: {} },
  });
  map.addLayer({
    id: 'layla-trip-glow', type: 'line', source: 'layla-trip-src',
    paint: { 'line-color': '#E86F51', 'line-width': 14, 'line-opacity': 0, 'line-blur': 3 },
    layout: { 'line-cap': 'round', 'line-join': 'round' },
  });
  map.addLayer({
    id: 'layla-trip-inner', type: 'line', source: 'layla-trip-src',
    paint: { 'line-color': '#FFEDE6', 'line-width': 1.2, 'line-opacity': 0, 'line-dasharray': [0.6, 1.6] },
    layout: { 'line-cap': 'round', 'line-join': 'round' },
  });

  // Progressive "travelled so far" trail — animates as microbus moves
  map.addSource('layla-trip-progress-src', {
    type: 'geojson',
    data: { type: 'Feature',
            geometry: { type: 'LineString', coordinates: [LAYLA_TRIP_ROUTE[0], LAYLA_TRIP_ROUTE[0]] },
            properties: {} },
  });
  map.addLayer({
    id: 'layla-trip-progress', type: 'line', source: 'layla-trip-progress-src',
    paint: { 'line-color': '#E86F51', 'line-width': 4.5, 'line-opacity': 0, 'line-blur': 0.4 },
    layout: { 'line-cap': 'round', 'line-join': 'round' },
  });

  // Origin / transfer / destination stop markers
  map.addSource('layla-trip-stops-src', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features: LAYLA_TRIP_STOPS.map(s => ({
      type: 'Feature', geometry: { type: 'Point', coordinates: s.coords },
      properties: { name: s.name, kind: s.kind },
    })) },
  });
  map.addLayer({
    id: 'layla-trip-stops', type: 'circle', source: 'layla-trip-stops-src',
    paint: {
      'circle-radius': ['match', ['get', 'kind'],
                        'origin', 10, 'destination', 10, 6],
      'circle-color': ['match', ['get', 'kind'],
                        'origin', '#E86F51',
                        'destination', '#2A9D8F',
                        '#E9C46A'],
      'circle-stroke-width': 2,
      'circle-stroke-color': '#0D1117',
      'circle-opacity': 0,
      'circle-stroke-opacity': 0,
    },
  });

  // Pulsing ring that lights up at each transfer pause
  map.addSource('layla-trip-transfer-src', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features: [] },
  });
  map.addLayer({
    id: 'layla-trip-transfer-pulse', type: 'circle', source: 'layla-trip-transfer-src',
    paint: {
      'circle-radius': 20,
      'circle-color': '#E9C46A',
      'circle-opacity': 0,
      'circle-blur': 1.15,
    },
  });

  // (Phase-1 ghost terminals are now rendered as 3D objects inside the
  // Three.js custom layer below — see `makeGhostMarker` and `this.ghosts`.)

  // ── Three.js 3D layer (added last so it draws on top of all 2D layers) ──
  if (typeof THREE !== 'undefined') {
    const threeLayer = buildCairoThreeLayer();
    map.addLayer(threeLayer);
    map._threeLayer = threeLayer;
  } else {
    console.error('[cairo-story] THREE global not found — 3D layer cannot be mounted. Check the three.js CDN script tag.');
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  COLOUR LEGEND  (top-right) — what each mode/character colour means
// ═══════════════════════════════════════════════════════════════════════
// Two sections: TRANSIT MODES (formal + informal vehicles) and GHOST TERMINALS
// (the 115 Phase 1 underused stops, sub-classed by distance to nearest new metro).
const LEGEND_MODES = [
  { color: '#58A6FF', glyph: 'M',  label: 'Metro · post-2014 build (Line 3 ext.)' },
  { color: '#4A6FA5', glyph: 'M',  label: 'Metro · pre-2014 (Lines 1 & 2)' },
  { color: '#B877C9', glyph: 'L',  label: 'LRT · 3-July line' },
  { color: '#E9C46A', glyph: 'B',  label: 'BRT · Ring Road' },
  { color: '#F4A261', glyph: '☻', label: 'Layla · the commuter' },
  { color: '#2A9D8F', glyph: 'O',  label: 'Office · Maadi destination' },
];

const LEGEND_GHOSTS = [
  { color: '#E86F51', glyph: '•', label: `Stranded · >2 km (${GHOST_STATS.stranded_over_2km})` },
  { color: '#E9C46A', glyph: '•', label: `Marginal · 1–2 km (${GHOST_STATS.marginal_1_2km})` },
  { color: '#2A9D8F', glyph: '•', label: `Reached · <1 km (${GHOST_STATS.reached_under_1km})` },
];

function LegendRow({ color, glyph, label }) {
  return (
    <div className="legend-row">
      <span className="legend-swatch" style={{ background: color, color }} />
      <span className="legend-glyph" style={{ color }}>{glyph}</span>
      <span className="legend-label">{label}</span>
    </div>
  );
}

function ColorLegend() {
  return (
    <div className="legend-card">
      <div className="legend-title">Transit Modes</div>
      {LEGEND_MODES.map((e) => <LegendRow key={e.label} {...e} />)}
      <div className="legend-title" style={{ marginTop: 12 }}>
        Ghost Terminals · {GHOST_STATS.total}
      </div>
      {LEGEND_GHOSTS.map((e) => <LegendRow key={e.label} {...e} />)}
      <div style={{
        marginTop: 8, fontSize: 9, color: '#8B949E', letterSpacing: '0.06em',
        borderTop: '1px solid rgba(88,166,255,0.12)', paddingTop: 6,
      }}>
        {GHOST_STATS.stranded_pct}% stranded · Phase 1 + post-2014 metro
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
//  MAIN APP
// ═══════════════════════════════════════════════════════════════════════
function App() {
  const mapContainerRef = useRef(null);
  const mapRef = useRef(null);
  const [mapReady, setMapReady] = useState(false);
  const [sceneIdx, setSceneIdx] = useState(0);
  const [autoPlay, setAutoPlay] = useState(false);
  const [diagnostics, setDiagnostics] = useState({
    layersAdded: 0,
    lastError: null,
    visibleNow: 0,
  });

  // Init map
  useEffect(() => {
    if (mapRef.current) return;
    const map = new maplibregl.Map({
      container: mapContainerRef.current,
      style: {
        version: 8,
        glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
        sources: {
          'carto-dark': {
            type: 'raster',
            tiles: [
              'https://a.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}@2x.png',
              'https://b.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}@2x.png',
              'https://c.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}@2x.png',
            ],
            tileSize: 256,
            attribution: '© CARTO · © OpenStreetMap contributors',
          },
          'carto-labels': {
            type: 'raster',
            tiles: [
              'https://a.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}@2x.png',
              'https://b.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}@2x.png',
              'https://c.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}@2x.png',
            ],
            tileSize: 256,
          },
        },
        layers: [
          { id: 'carto-dark-layer', type: 'raster', source: 'carto-dark' },
          { id: 'carto-labels-layer', type: 'raster', source: 'carto-labels',
            paint: { 'raster-opacity': 0.55 } },
        ],
      },
      center: SCENES[0].center,
      zoom: SCENES[0].zoom,
      pitch: SCENES[0].pitch,
      bearing: SCENES[0].bearing,
      attributionControl: false,
    });

    map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-left');

    map.on('load', async () => {
      try {
        await setupMapLayers(map);
        const addedLayers = map.getStyle().layers.length;
        console.log(`[setup] ${addedLayers} map layers (Three.js 3D layer mounted)`);
        setDiagnostics(d => ({ ...d, layersAdded: addedLayers }));

        mapRef.current = map;
        setMapReady(true);
        applyScene(map, SCENES[0]);
      } catch (err) {
        console.error('[setup] FAILED:', err);
        setDiagnostics(d => ({ ...d, lastError: err.message || String(err) }));
        mapRef.current = map;
        setMapReady(true);
      }
    });
  }, []);

  // When sceneIdx changes, apply it + update diagnostics
  useEffect(() => {
    if (!mapReady || !mapRef.current) return;
    applyScene(mapRef.current, SCENES[sceneIdx]);
    const visList = SCENES[sceneIdx].visible || [];
    const liveVis = visList.filter(id => mapRef.current.getLayer(id));
    setDiagnostics(d => ({ ...d, visibleNow: liveVis.length }));
  }, [sceneIdx, mapReady]);

  // Masari animated route on scene 12
  useMasariAnimation(mapRef.current, mapReady && SCENES[sceneIdx].animate === 'masari-route');
  // Layla chaos trip on scene 3
  useLaylaTripAnimation(mapRef.current, mapReady && SCENES[sceneIdx].animate === 'layla-trip');

  // Keyboard controls
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        setSceneIdx(i => Math.min(i + 1, SCENES.length - 1));
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        setSceneIdx(i => Math.max(i - 1, 0));
      } else if (e.key === 'r' || e.key === 'R') {
        setSceneIdx(0);
      } else if (e.key === 'p' || e.key === 'P') {
        setAutoPlay(a => !a);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  // Autoplay timer — animated scenes get extra dwell so the trip can play through
  useEffect(() => {
    if (!autoPlay) return;
    const animate = SCENES[sceneIdx].animate;
    let dwell = 8500;
    if (animate === 'masari-route') dwell = 11500;
    if (animate === 'layla-trip')   dwell = 13500;   // chaos trip is longer (4 legs + transfers)
    const t = setTimeout(() => {
      setSceneIdx(i => i < SCENES.length - 1 ? i + 1 : i);
    }, dwell);
    return () => clearTimeout(t);
  }, [autoPlay, sceneIdx]);

  const scene = SCENES[sceneIdx];

  // CTA: post a message to the parent Streamlit page
  const postMode = (mode) => {
    try {
      window.parent.postMessage({ type: 'cairo-story-cta', mode }, '*');
    } catch (_) {}
  };

  return (
    <>
      <div ref={mapContainerRef} className="map-stage" />
      <div className="vignette" />
      {/* Scene 7 ("TWO DENSITIES") swaps the MapLibre map for a dedicated
          3D population-surface viz built from the 2023 census
          (Phase2/CleanedData/districts.csv).  See density3d.html.       */}
      {sceneIdx === 6 && (
        <iframe
          key="density-iframe"
          src="density3d.html?embed=1"
          className="density-iframe"
          title="Cairo · Density 3D Heatmap"
        />
      )}
      <div className="version-tag">BUILD · V23 · FULL METRO NETWORK</div>
      <ColorLegend />
      {mapReady && <TopBar scene={scene} sceneIdx={sceneIdx} total={SCENES.length} />}
      {mapReady && (
        <NarrativePanel
          scene={scene}
          onReplay={() => setSceneIdx(0)}
          onGoPhase1={() => postMode('phase1')}
          onGoPhase2={() => postMode('phase2')}
          onGoHypotheses={() => postMode('hypothesis')}
        />
      )}
      {mapReady && scene.chart === 'h1'   && <ChartH1   />}
      {mapReady && scene.chart === 'h2'   && <ChartH2   />}
      {mapReady && scene.chart === 'h3'   && <ChartH3   />}
      {mapReady && scene.chart === 'q18b' && <ChartQ18b />}
      {mapReady && (
        <BottomBar
          sceneIdx={sceneIdx}
          total={SCENES.length}
          onPrev={() => setSceneIdx(i => Math.max(0, i - 1))}
          onNext={() => setSceneIdx(i => Math.min(SCENES.length - 1, i + 1))}
          onJump={(i) => setSceneIdx(i)}
          autoPlay={autoPlay}
          setAutoPlay={setAutoPlay}
          scene={scene}
        />
      )}

      {/* Splash */}
      <div className={'splash ' + (mapReady ? 'hidden' : '')}>
        <div className="splash-logo">CAIRO · LAYLA · MASARI</div>
        <div className="splash-sub">Loading cinematic data story…</div>
        <div className="splash-bar"></div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
})();
</script>

</body>
</html>
